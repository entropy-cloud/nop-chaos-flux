<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="100%">
  <defs>
    <radialGradient id="bg1" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1230"/>
      <stop offset="100%" stop-color="#02030a"/>
    </radialGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="40%" stop-color="#a8d8ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3060c0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="field" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#4080ff" stop-opacity="0"/>
      <stop offset="90%" stop-color="#60a0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#80c0ff" stop-opacity="0.35"/>
    </radialGradient>
    <linearGradient id="t1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ff6090" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="t2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#60ffd0" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="t3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffb060" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="t4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#a080ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg1)"/>

  <!-- Stars -->
  <g fill="#ffffff" opacity="0.5">
    <circle cx="120" cy="180" r="1"/><circle cx="300" cy="80" r="1.2"/>
    <circle cx="1450" cy="220" r="1"/><circle cx="1380" cy="700" r="1.3"/>
    <circle cx="200" cy="780" r="1"/><circle cx="1500" cy="450" r="1"/>
    <circle cx="80" cy="500" r="0.8"/><circle cx="1200" cy="100" r="0.9"/>
    <circle cx="500" cy="60" r="0.8"/><circle cx="900" cy="820" r="1"/>
  </g>

  <!-- Outer force field grid (sphere) -->
  <g fill="none" stroke="#7ab0ff" stroke-width="0.8" opacity="0.35">
    <ellipse cx="800" cy="450" rx="380" ry="380"/>
    <ellipse cx="800" cy="450" rx="380" ry="120"/>
    <ellipse cx="800" cy="450" rx="380" ry="220"/>
    <ellipse cx="800" cy="450" rx="380" ry="320"/>
    <ellipse cx="800" cy="450" rx="120" ry="380"/>
    <ellipse cx="800" cy="450" rx="220" ry="380"/>
    <ellipse cx="800" cy="450" rx="320" ry="380"/>
  </g>
  <circle cx="800" cy="450" r="380" fill="url(#field)"/>
  <circle cx="800" cy="450" r="380" fill="none" stroke="#a0c8ff" stroke-width="1.5" opacity="0.6"/>

  <!-- Inward convergence arrows -->
  <g stroke="#80c0ff" stroke-width="2" fill="#80c0ff" opacity="0.85">
    <g transform="translate(800,450)">
      <g>
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(45)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(90)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(135)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(180)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(225)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(270)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
      <g transform="rotate(315)">
        <line x1="430" y1="0" x2="395" y2="0"/>
        <polygon points="395,0 408,-6 408,6"/>
      </g>
    </g>
  </g>

  <!-- Divergence tendrils (curved paths from center outward) -->
  <g fill="none" stroke-width="3" stroke-linecap="round" opacity="0.85">
    <path d="M 800 450 Q 900 380 1000 360 T 1140 320" stroke="url(#t1)"/>
    <path d="M 800 450 Q 880 520 1000 540 T 1150 580" stroke="url(#t2)"/>
    <path d="M 800 450 Q 700 380 600 360 T 460 330" stroke="url(#t3)"/>
    <path d="M 800 450 Q 720 540 600 560 T 470 600" stroke="url(#t4)"/>
    <path d="M 800 450 Q 820 350 850 250 T 880 130" stroke="url(#t1)"/>
    <path d="M 800 450 Q 780 560 760 660 T 730 770" stroke="url(#t2)"/>
    <path d="M 800 450 Q 920 460 1020 430 T 1170 420" stroke="url(#t3)"/>
    <path d="M 800 450 Q 680 460 580 430 T 430 440" stroke="url(#t4)"/>
    <path d="M 800 450 Q 870 320 950 230 T 1080 110" stroke="url(#t2)"/>
    <path d="M 800 450 Q 720 320 640 230 T 510 120" stroke="url(#t1)"/>
    <path d="M 800 450 Q 880 600 950 700 T 1050 800" stroke="url(#t3)"/>
    <path d="M 800 450 Q 720 600 650 700 T 540 800" stroke="url(#t4)"/>
  </g>

  <!-- Central core -->
  <circle cx="800" cy="450" r="180" fill="url(#core)"/>
  <circle cx="800" cy="450" r="55" fill="#ffffff"/>
  <circle cx="800" cy="450" r="35" fill="#fff" opacity="0.95"/>

  <!-- Title -->
  <text x="800" y="60" text-anchor="middle" fill="#e8f0ff" font-family="Helvetica, Arial, sans-serif" font-size="32" font-weight="300" letter-spacing="3">THE DYNAMICS OF CONTROLLED CONVERGENCE</text>
  <text x="800" y="95" text-anchor="middle" fill="#7090c0" font-family="Helvetica, Arial, sans-serif" font-size="16" letter-spacing="6">受控收敛的动力系统</text>

  <!-- Labels -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#cfe0ff">
    <line x1="800" y1="450" x2="1280" y2="450" stroke="#80c0ff" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
    <text x="1290" y="448" font-size="16" font-weight="600">CONVERGENCE</text>
    <text x="1290" y="468" font-size="12" fill="#80a0c0">收敛力 · 力场约束</text>

    <line x1="800" y1="450" x2="1140" y2="320" stroke="#ff8aa8" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
    <text x="1150" y="318" font-size="16" font-weight="600" fill="#ffb0c8">DIVERGENCE</text>
    <text x="1150" y="338" font-size="12" fill="#a07088">AI 扩张力</text>

    <line x1="800" y1="450" x2="800" y2="690" stroke="#ffffff" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.6"/>
    <text x="800" y="715" text-anchor="middle" font-size="16" font-weight="600">ATTRACTOR</text>
    <text x="800" y="735" text-anchor="middle" font-size="12" fill="#80a0c0">吸引子 · 架构基线</text>
  </g>
</svg>