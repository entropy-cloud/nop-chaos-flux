<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The Lorenz Attractor: Locally Unpredictable, Globally Bounded</title>
  <desc id="desc">A neon Lorenz attractor butterfly path with annotations for development trajectory, basin of attraction, and the bounded chaos concept.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="80%">
      <stop offset="0%" stop-color="#101729"/>
      <stop offset="55%" stop-color="#08101d"/>
      <stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <linearGradient id="trace" x1="20%" y1="15%" x2="80%" y2="85%">
      <stop offset="0%" stop-color="#b8f8ff"/>
      <stop offset="25%" stop-color="#79d7ff"/>
      <stop offset="55%" stop-color="#4c92ff"/>
      <stop offset="100%" stop-color="#8a58ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#66e6ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.24">
