<!doctype html>
<html lang="{{lang}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{title}}</title>
    <link rel="stylesheet" href="assets/css/all.min.css" />
    <script src="assets/js/html2pdf.bundle.min.js"></script>
    <script src="assets/js/mermaid.min.js"></script>
    <script src="assets/js/lightbox.js"></script>
    <style>
      :root {
        --color-primary: #2563eb;
        --color-primary-dark: #1e40af;
        --color-secondary: #059669;
        --color-warning: #d97706;
        --color-danger: #dc2626;
        --color-text-dark: #1f2937;
        --color-text-light: #4b5563;
        --color-bg-main: #f4f6f9;
        --color-bg-slide: #ffffff;
        --color-border: #e5e7eb;
        --color-code-bg: #f8fafc;
        --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-code: 'Fira Code', monospace;
        --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        --font-size-base: 1.25rem;
        --line-height-base: 1.7;
        --controls-area-height: 40px;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: var(--font-main);
        background-color: var(--color-bg-main);
        color: var(--color-text-dark);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        line-height: var(--line-height-base);
      }
      #presentation-container {
        width: 90vw; height: 90vh; max-width: 1200px;
        background: var(--color-bg-slide);
        border-radius: 16px;
        box-shadow: var(--shadow-lg);
        display: flex; flex-direction: column;
        overflow: hidden; position: relative;
        padding-bottom: var(--controls-area-height);
      }
      .slides-viewport {
        flex-grow: 1; position: relative; overflow: hidden;
      }
      .slide {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        padding: 50px 60px; opacity: 0; visibility: hidden;
        transition: opacity 0.5s ease-in-out, transform 0.5s ease-in-out;
        transform: translateY(10px);
        display: flex; flex-direction: column; justify-content: flex-start;
        overflow-y: auto; background-color: var(--color-bg-slide);
        animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }
      .slide.active {
        opacity: 1; visibility: visible; transform: translateY(0); z-index: 1;
      }
      h1, h2, h3 { font-weight: 700; line-height: 1.2; }
      h1 { font-size: 2.8rem; margin-bottom: 1rem; }
      h2 {
        font-size: 2.2rem; color: var(--color-text-dark);
        border-bottom: 3px solid var(--color-primary);
        padding-bottom: 0.75rem; margin-bottom: 1.5rem; font-weight: 600;
      }
      h3 { font-size: 1.4rem; color: var(--color-primary); margin-bottom: 0.8rem; }
      h4 { font-size: 1.15rem; font-weight: 600; color: var(--color-text-dark); margin-bottom: 0.5rem; }
      p, li { font-size: var(--font-size-base); color: var(--color-text-light); margin-bottom: 0.6rem; }
      strong { color: var(--color-primary); font-weight: 600; }
      ul { list-style: none; padding-left: 0; }
      li p { margin-bottom: 0.25rem; }
      #progress-bar {
        position: absolute; top: 0; left: 0; height: 4px;
        background-color: var(--color-primary); width: 0%;
        transition: width 0.4s ease; z-index: 10;
      }
      .controls {
        position: absolute; bottom: 20px; right: 20px;
        display: flex; gap: 10px; z-index: 10;
      }
      .btn {
        background-color: var(--color-primary); color: white; border: none;
        padding: 10px 18px; border-radius: 8px; cursor: pointer;
        font-weight: 600; display: flex; align-items: center; gap: 8px;
        transition: all 0.2s ease; box-shadow: var(--shadow-md);
      }
      .btn:hover:not(:disabled) {
        background-color: var(--color-primary-dark);
        transform: translateY(-2px); box-shadow: var(--shadow-lg);
      }
      .btn:disabled {
        background-color: #9ca3af; cursor: not-allowed;
        transform: none; box-shadow: var(--shadow-md);
      }
      #pdf-btn { background-color: var(--color-secondary); }
      #pdf-btn:hover:not(:disabled) { background-color: #047857; }
      #print-btn { background-color: #6366f1; }
      #print-btn:hover:not(:disabled) { background-color: #4f46e5; }
      #slide-counter {
        position: absolute; bottom: 20px; left: 20px;
        background: rgba(255,255,255,0.8); backdrop-filter: blur(5px);
        padding: 8px 14px; border-radius: 8px; font-size: 0.9rem;
        font-weight: 600; color: var(--color-text-dark);
        box-shadow: var(--shadow-md); z-index: 10;
      }
      .title-slide { text-align: center; align-items: center; }
      .slide.title-slide { justify-content: center; align-items: center; }
      .title-slide h1 { font-size: 2.8rem; color: var(--color-text-dark); line-height: 1.3; }
      .title-slide .subtitle { font-size: 1.3rem; color: var(--color-text-light); font-weight: 400; margin-top: 0.5rem; }
      .title-slide .author { font-size: 1.2rem; color: var(--color-text-light); margin-top: 1rem; font-weight: 400; }
      .icon-list { list-style: none; padding: 0; margin: 0.8rem 0; }
      .icon-bullet {
        display: flex; gap: 14px;
        background-color: var(--color-code-bg);
        padding: 14px; border-radius: 10px; margin-bottom: 10px;
        border: 1px solid var(--color-border);
        transition: all 0.3s ease;
      }
      .icon-bullet:hover { transform: translateX(5px); box-shadow: var(--shadow-md); }
      .icon-bullet i {
        font-size: 1.15rem; color: var(--color-primary);
        margin-top: 4px; flex-shrink: 0; width: 24px; text-align: center;
      }
      .icon-bullet div { flex-grow: 1; }
      .icon-bullet p { margin-bottom: 0.2rem; color: var(--color-text-dark); font-weight: 500; font-size: 1.1rem; }
      .icon-bullet .details { font-size: calc(var(--font-size-base) - 0.25rem); color: var(--color-text-light); font-weight: 400; }
      .sub-items { margin-top: 0.4rem; margin-left: 1rem; }
      .sub-item {
        font-size: calc(var(--font-size-base) - 0.15rem); color: var(--color-text-light);
        margin-bottom: 0.2rem; position: relative; padding-left: 1rem;
      }
      .sub-item::before { content: '\2022'; color: var(--color-secondary); position: absolute; left: 0; }
      .two-column { display: flex; gap: 30px; align-items: flex-start; width: 100%; }
      .column { flex: 1; }
      .column-narrow { flex: 0.7; }
      .column-wide { flex: 1.3; }
      .highlight-box {
        background-color: #eff6ff; border-left: 4px solid var(--color-primary);
        padding: 16px 20px; margin: 1rem 0; border-radius: 0 8px 8px 0;
      }
      .highlight-box p { margin-bottom: 0.3rem; }
      .quote {
        background: #fffbeb; border-left: 4px solid var(--color-warning);
        padding: 16px 20px; margin: 1rem 0; border-radius: 0 8px 8px 0;
        font-style: italic; color: #92400e;
      }
      .quote p { font-size: calc(var(--font-size-base) + 0.05rem); }
      .golden-quote {
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
        border-left: 4px solid #f59e0b;
        padding: 18px 24px; margin: 1.2rem 0; border-radius: 0 12px 12px 0;
        font-size: 1.15rem; font-weight: 500; color: #78350f;
        box-shadow: var(--shadow-md); text-align: center;
      }
      .key-quote {
        background: linear-gradient(135deg, #eff6ff 0%, #f0fdf4 100%);
        border: 2px solid var(--color-primary); border-radius: 12px;
        padding: 1.2rem 1.5rem; margin: 1rem 0; text-align: center;
      }
      .key-quote p { font-size: 1.2rem; font-weight: 600; color: var(--color-primary-dark); margin: 0; }
      .stat-grid {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 16px; margin: 1.2rem 0;
      }
      .stat-card {
        background: var(--color-code-bg); padding: 16px; border-radius: 12px;
        text-align: center; border: 1px solid var(--color-border);
        transition: all 0.3s ease;
      }
      .stat-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-md); }
      .stat-number { font-size: 2.2rem; font-weight: 700; color: var(--color-primary); display: block; }
      .stat-label { font-size: 0.85rem; color: var(--color-text-light); margin-top: 0.2rem; }
      .mermaid-container {
        background-color: var(--color-code-bg); padding: 1rem; border-radius: 8px;
        border: 1px solid var(--color-border); margin: 1.5rem 0; overflow: auto;
      }
      .mermaid { display: flex; justify-content: center; width: 100%; }
      .comparison-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: var(--font-size-base); }
      .comparison-table th, .comparison-table td { padding: 10px 14px; text-align: left; border: 1px solid var(--color-border); }
      .comparison-table th { background-color: var(--color-primary); color: white; font-weight: 600; }
      .comparison-table tr:nth-child(even) { background-color: var(--color-code-bg); }
      .flow-layout { display: flex; align-items: flex-start; gap: 1rem; margin-top: 1rem; width: 100%; flex-wrap: wrap; }
      .flow-step {
        flex: 1; min-width: 140px; background-color: var(--color-code-bg);
        border: 1px solid var(--color-border); border-radius: 12px;
        padding: 1rem; text-align: center; display: flex; flex-direction: column; align-items: center;
      }
      .flow-step h4 { font-size: 1rem; color: var(--color-primary); margin-bottom: 0.5rem; }
      .flow-step .details { font-size: 0.9rem; color: var(--color-text-light); line-height: 1.5; }
      .flow-arrow { font-size: 2rem; color: var(--color-primary); margin-top: 50px; }
      .card-grid { display: grid; gap: 1rem; margin-top: 1rem; }
      .card-grid-2 { grid-template-columns: 1fr 1fr; }
      .card-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
      .card {
        background-color: var(--color-code-bg); border: 1px solid var(--color-border);
        border-radius: 10px; padding: 1.1rem; transition: all 0.3s ease;
      }
      .card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); }
      .card h4 { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }
      .card h4 i { color: var(--color-primary); }
      .card .details { font-size: 0.95rem; color: var(--color-text-light); line-height: 1.5; margin: 0; }
      .timeline { position: relative; padding: 1rem 0; margin: 1rem 0; }
      .timeline::before {
        content: ''; position: absolute; top: 50%; left: 5%; right: 5%;
        height: 4px; background: var(--color-border); border-radius: 2px;
      }
      .timeline-items { display: flex; justify-content: space-between; position: relative; }
      .timeline-item { text-align: center; flex: 1; position: relative; padding-top: 20px; }
      .timeline-item::before {
        content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
        width: 16px; height: 16px; border-radius: 50%; background: var(--color-primary);
        border: 3px solid white; box-shadow: var(--shadow-md); z-index: 1;
      }
      .timeline-item .label { font-size: 0.9rem; font-weight: 600; color: var(--color-text-dark); margin-bottom: 0.3rem; }
      .timeline-item .desc { font-size: 0.8rem; color: var(--color-text-light); }
      .tag { display: inline-block; background: #dbeafe; color: var(--color-primary); padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; margin-right: 4px; }
      .tag-warn { background: #fef3c7; color: #92400e; }
      .tag-danger { background: #fee2e2; color: #991b1b; }
      .tag-success { background: #dcfce7; color: #166534; }
      code {
        background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
        padding: 2px 6px; border-radius: 4px; font-family: var(--font-code);
        font-size: 0.9em; color: #0f172a; border: 1px solid #e2e8f0; white-space: nowrap;
      }
      .icon-bullet code, .details code, .sub-item code {
        background: rgba(59,130,246,0.1); color: var(--color-primary-dark);
        border-color: rgba(59,130,246,0.2);
      }
      .cycle-diagram { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; margin: 1.5rem 0; }
      .cycle-step {
        background: var(--color-code-bg); border: 2px solid var(--color-border);
        padding: 12px 18px; border-radius: 10px; font-weight: 500;
        text-align: center; min-width: 140px;
      }
      .cycle-step.highlight { background: var(--color-primary); color: white; border-color: var(--color-primary-dark); }
      .cycle-arrow { font-size: 1.5rem; color: var(--color-primary); }
      /* Animations */
      .slide.active .icon-bullet { animation: slideInLeft 0.4s ease-out both; }
      .slide.active .icon-bullet:nth-child(1) { animation-delay: 0.1s; }
      .slide.active .icon-bullet:nth-child(2) { animation-delay: 0.15s; }
      .slide.active .icon-bullet:nth-child(3) { animation-delay: 0.2s; }
      .slide.active .icon-bullet:nth-child(4) { animation-delay: 0.25s; }
      .slide.active .icon-bullet:nth-child(5) { animation-delay: 0.3s; }
      .slide.active .card { animation: fadeInUp 0.4s ease-out both; }
      .slide.active .card:nth-child(1) { animation-delay: 0.1s; }
      .slide.active .card:nth-child(2) { animation-delay: 0.15s; }
      .slide.active .card:nth-child(3) { animation-delay: 0.2s; }
      .slide.active .stat-card { animation: scaleIn 0.3s ease-out both; }
      .slide.active .stat-card:nth-child(1) { animation-delay: 0.05s; }
      .slide.active .stat-card:nth-child(2) { animation-delay: 0.1s; }
      .slide.active .stat-card:nth-child(3) { animation-delay: 0.15s; }
      .slide.active .stat-card:nth-child(4) { animation-delay: 0.2s; }
      .slide.active .stat-card:nth-child(5) { animation-delay: 0.25s; }
      .slide.active .stat-card:nth-child(6) { animation-delay: 0.3s; }
      .slide.active .stat-card:nth-child(7) { animation-delay: 0.35s; }
      .slide.active .stat-card:nth-child(8) { animation-delay: 0.4s; }
      .slide.active .golden-quote { animation: fadeInUp 0.5s ease-out 0.3s both; }
      .slide.active .highlight-box { animation: fadeInUp 0.4s ease-out 0.2s both; }
      @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
      @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
      .keyboard-hint {
        position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%);
        background: rgba(0,0,0,0.7); color: white; padding: 6px 12px;
        border-radius: 6px; font-size: 0.75rem; opacity: 0;
        transition: opacity 0.3s; z-index: 100; pointer-events: none;
      }
      .keyboard-hint.show { opacity: 1; }
      .keyboard-hint kbd {
        background: rgba(255,255,255,0.2); padding: 2px 6px;
        border-radius: 3px; margin: 0 2px; font-family: var(--font-code);
      }
      @media (max-width: 768px) {
        .slide { padding: 30px; }
        h1 { font-size: 2rem; }
        h2 { font-size: 1.5rem; }
        .two-column, .stat-grid { flex-direction: column; grid-template-columns: 1fr; }
        .controls { right: auto; left: 50%; transform: translateX(-50%); }
        #slide-counter { display: none; }
        .comparison-table { font-size: 0.9rem; }
        .card-grid-2, .card-grid-3 { grid-template-columns: 1fr; }
      }
      @media print {
        body { background: #fff !important; height: auto; overflow: visible; display: block; }
        .controls, #progress-bar, #slide-counter { display: none !important; }
        #presentation-container {
          display: block; width: 100%; height: auto;
          box-shadow: none; border: none; padding: 0;
        }
        .slides-viewport { overflow: visible; height: auto; }
        .slide {
          display: flex !important; opacity: 1 !important; visibility: visible !important;
          transform: none !important; position: relative; page-break-after: always;
          page-break-inside: avoid; width: 100%; height: auto; aspect-ratio: 16/12;
          border: 1px solid #ddd; margin-bottom: 20px; box-shadow: none;
          border-radius: 0; overflow: hidden;
        }
        .slide:last-of-type { page-break-after: avoid; }
        svg * { animation-play-state: paused !important; }
      }
      .pdf-page-container { width: 100%; height: auto; background: white; color: black; box-shadow: none; }
      .pdf-slide {
        position: relative !important; opacity: 1 !important; visibility: visible !important;
        transform: none !important; height: auto !important; width: 100%;
        background: white; border: 1px solid #eee; padding: 40px 50px;
        box-shadow: none; margin-bottom: 0; overflow: hidden;
        page-break-after: always; break-inside: avoid; aspect-ratio: 16/12;
      }
      .pdf-slide:last-of-type { page-break-after: avoid; }
      .pdf-slide, .pdf-slide * { animation: none !important; opacity: 1 !important; }
    </style>
  </head>
  <body>
    <div id="presentation-container">
      <div id="progress-bar"></div>
      <div id="slide-counter">1 / N</div>
      <div id="keyboard-hint" class="keyboard-hint">
        <kbd>&larr;</kbd><kbd>&rarr;</kbd> 翻页 &nbsp;|&nbsp; <kbd>Home</kbd> 首页 &nbsp;|&nbsp;
        <kbd>F</kbd> 全屏 &nbsp;|&nbsp; <kbd>?</kbd> 帮助
      </div>
      <div class="slides-viewport">

        <!-- ===== SLIDES START ===== -->
        <!--
          Each slide is a <section class="slide">
          First slide adds "active title-slide" classes.
          Use: icon-list, two-column, card-grid, stat-grid, highlight-box,
               golden-quote, key-quote, quote, flow-layout, comparison-table,
               timeline, cycle-diagram, tag/tag-warn/tag-danger/tag-success
        -->

        <!-- ===== SLIDES END ===== -->

      </div>
      <div class="controls">
        <button class="btn" id="home-btn" title="First Slide (Home)"><i class="fa-solid fa-home"></i></button>
        <button class="btn" id="prev-btn" title="Previous (&larr;)"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="btn" id="next-btn" title="Next (&rarr; / Space)"><i class="fa-solid fa-arrow-right"></i></button>
        <button class="btn" id="fullscreen-btn" title="Fullscreen (F)"><i class="fa-solid fa-expand"></i></button>
        <button class="btn" id="print-btn" title="Print"><i class="fa-solid fa-print"></i></button>
        <button class="btn" id="pdf-btn" title="Export to PDF"><i class="fa-solid fa-file-pdf"></i></button>
      </div>
    </div>
    <script>
      mermaid.initialize({
        startOnLoad: true, theme: 'default', securityLevel: 'loose',
        fontFamily: 'var(--font-main)',
        flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' }
      });
    </script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('presentation-container');
        const allSlides = document.querySelectorAll('.slide');
        const homeBtn = document.getElementById('home-btn');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const printBtn = document.getElementById('print-btn');
        const pdfBtn = document.getElementById('pdf-btn');
        const slideCounter = document.getElementById('slide-counter');
        const progressBar = document.getElementById('progress-bar');
        const keyboardHint = document.getElementById('keyboard-hint');
        let currentSlide = 0;
        const totalSlides = allSlides.length;
        let hintTimeout = null;

        function showKeyboardHint() {
          if (keyboardHint) {
            keyboardHint.classList.add('show');
            clearTimeout(hintTimeout);
            hintTimeout = setTimeout(() => keyboardHint.classList.remove('show'), 3000);
          }
        }
        function showSlide(index, skipHashUpdate) {
          if (index < 0 || index >= totalSlides) return;
          allSlides.forEach((s, i) => s.classList.toggle('active', i === index));
          currentSlide = index;
          updateControls();
          if (!skipHashUpdate) updateHash(index);
        }
        function updateControls() {
          slideCounter.textContent = (currentSlide + 1) + ' / ' + totalSlides;
          progressBar.style.width = ((currentSlide + 1) / totalSlides * 100) + '%';
          prevBtn.disabled = currentSlide === 0;
          nextBtn.disabled = currentSlide === totalSlides - 1;
        }
        function nextSlide() { showSlide(currentSlide + 1); }
        function prevSlide() { showSlide(currentSlide - 1); }
        function goToFirstSlide() { showSlide(0); }
        function toggleFullscreen() {
          if (!document.fullscreenElement) {
            container.requestFullscreen().catch(function(err) { alert('Cannot enter fullscreen: ' + err.message); });
          } else { document.exitFullscreen(); }
        }
        function updateHash(index) {
          var hash = '#slide-' + (index + 1);
          if (location.hash !== hash) history.pushState(null, null, hash);
        }
        function parseHashToIndex() {
          var m = location.hash.match(/slide-(\d+)/i);
          if (m) { var idx = parseInt(m[1], 10) - 1; if (!isNaN(idx) && idx >= 0 && idx < totalSlides) return idx; }
          return null;
        }
        function printPresentation() { window.print(); }
        function hasExternalImages() {
          return Array.from(document.querySelectorAll('.slide img')).some(function(img) {
            var src = img.getAttribute('src') || '';
            return src && !src.startsWith('data:');
          });
        }
        function showLocalFileWarning() {
          var overlay = document.createElement('div');
          overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';
          var dialog = document.createElement('div');
          dialog.style.cssText = 'background:white;border-radius:16px;padding:32px 40px;max-width:560px;box-shadow:0 20px 60px rgba(0,0,0,0.3);font-family:Inter,-apple-system,sans-serif;';
          dialog.innerHTML = '<h3 style="margin:0 0 16px;font-size:1.3rem;color:#1f2937;">\u26a0\ufe0f 本地文件模式</h3><p style="color:#4b5563;font-size:1rem;line-height:1.7;margin:0 0 12px;">当前通过 <code style="background:#f1f5f9;padding:2px 6px;border-radius:4px;font-size:0.9em;">file://</code> 协议直接打开，页面中的本地图片将无法嵌入 PDF。</p><div style="display:flex;gap:12px;justify-content:flex-end;"><button id="pdf-cancel-btn" style="padding:10px 20px;border:1px solid #d1d5db;border-radius:8px;background:white;cursor:pointer;font-size:1rem;font-weight:600;color:#4b5563;">取消</button><button id="pdf-continue-btn" style="padding:10px 20px;border:none;border-radius:8px;background:#2563eb;color:white;cursor:pointer;font-size:1rem;font-weight:600;">继续导出</button></div>';
          overlay.appendChild(dialog);
          document.body.appendChild(overlay);
          return new Promise(function(resolve) {
            dialog.querySelector('#pdf-cancel-btn').onclick = function() { document.body.removeChild(overlay); resolve(false); };
            dialog.querySelector('#pdf-continue-btn').onclick = function() { document.body.removeChild(overlay); resolve(true); };
            overlay.onclick = function(e) { if (e.target === overlay) { document.body.removeChild(overlay); resolve(false); } };
          });
        }
        async function prepareForPdf() {
          var pdfContainer = document.createElement('div');
          pdfContainer.className = 'pdf-page-container';
          allSlides.forEach(function(slide) {
            var clone = slide.cloneNode(true);
            clone.classList.remove('active');
            clone.classList.add('pdf-slide');
            pdfContainer.appendChild(clone);
          });
          document.body.appendChild(pdfContainer);
          return pdfContainer;
        }
        async function exportToPDF() {
          if (location.protocol === 'file:' && hasExternalImages()) {
            var proceed = await showLocalFileWarning();
            if (!proceed) return;
          }

          var originalButtonContent = pdfBtn.innerHTML;
          pdfBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Generating...';
          pdfBtn.disabled = true;
          prepareForPdf().then(function(pdfContainer) {
            var options = {
              margin: 0,
              filename: '{{pdf-filename}}',
              image: { type: 'jpeg', quality: 0.98 },
              html2canvas: { scale: 2, useCORS: true, allowTaint: true, letterRendering: true, backgroundColor: '#ffffff' },
              jsPDF: { unit: 'in', format: 'letter', orientation: 'landscape' },
              pagebreak: { mode: ['css'] }
            };
            html2pdf()
              .set(options)
              .from(pdfContainer)
              .save()
              .then(function() {
                document.body.removeChild(pdfContainer);
                pdfBtn.innerHTML = originalButtonContent;
                pdfBtn.disabled = false;
              })
              .catch(function(err) {
                document.body.removeChild(pdfContainer);
                pdfBtn.innerHTML = originalButtonContent;
                pdfBtn.disabled = false;
                alert('PDF export failed: ' + (err.message || err));
              });
          });
        }
        homeBtn.addEventListener('click', goToFirstSlide);
        nextBtn.addEventListener('click', nextSlide);
        prevBtn.addEventListener('click', prevSlide);
        fullscreenBtn.addEventListener('click', toggleFullscreen);
        printBtn.addEventListener('click', printPresentation);
        pdfBtn.addEventListener('click', exportToPDF);
        document.addEventListener('keydown', function(e) {
          if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
          if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); nextSlide(); }
          if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); prevSlide(); }
          if (e.key === 'Home') { e.preventDefault(); goToFirstSlide(); }
          if (e.key === 'End') { e.preventDefault(); showSlide(totalSlides - 1); }
          if (e.key === 'f' || e.key === 'F') { e.preventDefault(); toggleFullscreen(); }
          if (e.key === '?' || e.key === 'h' || e.key === 'H') { e.preventDefault(); showKeyboardHint(); }
        });
        var touchStartX = 0;
        container.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
        container.addEventListener('touchend', function(e) {
          var touchEndX = e.changedTouches[0].screenX;
          if (touchStartX - touchEndX > 50) nextSlide();
          if (touchEndX - touchStartX > 50) prevSlide();
        });
        window.addEventListener('popstate', function() {
          var idx = parseHashToIndex();
          if (idx !== null && idx !== currentSlide) showSlide(idx, true);
        });
        var initialIndex = parseHashToIndex();
        if (initialIndex !== null) showSlide(initialIndex, true);
        else showSlide(0);
        setTimeout(function() {
          if (window.enableContentLightboxForSelector)
            window.enableContentLightboxForSelector('.mermaid svg, .column img, .slide svg');
        }, 1000);
      });
    </script>
  </body>
</html>
