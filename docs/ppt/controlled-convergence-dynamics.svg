<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The Dynamics of Controlled Convergence</title>
  <desc id="desc">A clean central diagram showing an attractor core, a basin of attraction, a bounded development trajectory, outward divergence arrows, and inward convergence arrows.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="76%">
      <stop offset="0%" stop-color="#17203a"/>
      <stop offset="58%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#04070c"/>
    </radialGradient>
    <linearGradient id="divergence" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd7a0"/>
      <stop offset="52%" stop-color="#ff9cb1"/>
      <stop offset="100%" stop-color="#ff5d7d"/>
    </linearGradient>
    <linearGradient id="convergence" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7ce6ff"/>
      <stop offset="100%" stop-color="#56b2ff"/>
    </linearGradient>
    <radialGradient id="basin" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#71d5ff" stop-opacity="0.06"/>
      <stop offset="74%" stop-color="#71d5ff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#71d5ff" stop-opacity="0.03"/>
    </radialGradient>
    <radialGradient id="core" cx="42%" cy="34%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="34%" stop-color="#dff5ff"/>
      <stop offset="70%" stop-color="#7fd6ff"/>
      <stop offset="100%" stop-color="#2561cb"/>
    </radialGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#8eb9ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowOut" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#ff7894"/>
    </marker>
    <marker id="arrowIn" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#6fdcff"/>
    </marker>
    <marker id="arrowPath" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#ffd36e"/>
    </marker>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect width="1280" height="720" fill="url(#grid)" opacity="0.42"/>

  <g fill="#ffffff" opacity="0.24">
    <circle cx="92" cy="68" r="1.1"/>
    <circle cx="310" cy="96" r="0.9"/>
    <circle cx="524" cy="70" r="1"/>
    <circle cx="798" cy="84" r="0.8"/>
    <circle cx="1038" cy="62" r="1.1"/>
    <circle cx="1182" cy="170" r="0.9"/>
    <circle cx="176" cy="624" r="0.9"/>
    <circle cx="932" cy="640" r="1"/>
    <circle cx="1168" cy="586" r="1.1"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="640" y="74" text-anchor="middle" fill="#f4f8ff" font-size="30" font-weight="700" letter-spacing="1">The Dynamics of Controlled Convergence</text>
    <text x="640" y="102" text-anchor="middle" fill="#9eb6d5" font-size="14" letter-spacing="2.1">受控收敛的动力系统</text>
  </g>

  <g transform="translate(640 380)">
    <circle cx="0" cy="0" r="282" fill="none" stroke="#80a8ff" stroke-opacity="0.12" stroke-width="1.4" stroke-dasharray="10 12"/>

    <ellipse cx="0" cy="0" rx="242" ry="188" fill="url(#basin)" stroke="#7ad9ff" stroke-opacity="0.28" stroke-width="1.8"/>
    <ellipse cx="0" cy="0" rx="212" ry="162" fill="none" stroke="#7ad9ff" stroke-opacity="0.14" stroke-width="1.1" stroke-dasharray="7 8"/>

    <g>
      <path d="M90 -104C152 -146 214 -166 286 -176" fill="none" stroke="url(#divergence)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowOut)" opacity="0.95"/>
      <path d="M250 -154C218 -122 182 -102 132 -86" fill="none" stroke="#6fe0ff" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round" marker-end="url(#arrowIn)" opacity="0.96"/>

      <path d="M142 34C206 44 252 76 298 132" fill="none" stroke="url(#divergence)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowOut)" opacity="0.95"/>
      <path d="M270 116C234 92 196 66 144 42" fill="none" stroke="#6fe0ff" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round" marker-end="url(#arrowIn)" opacity="0.96"/>

      <path d="M-118 94C-172 126 -228 150 -286 170" fill="none" stroke="url(#divergence)" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowOut)" opacity="0.95"/>
      <path d="M-254 154C-214 136 -176 118 -112 90" fill="none" stroke="#6fe0ff" stroke-width="3" stroke-dasharray="10 8" stroke-linecap="round" marker-end="url(#arrowIn)" opacity="0.96"/>
    </g>

    <path d="M92 -12C122 -82 90 -132 36 -144C-18 -156 -62 -126 -76 -74C-92 -14 -54 22 4 36C72 52 102 94 78 136C48 180 -22 190 -74 168C-126 146 -156 94 -164 40C-172 -38 -138 -100 -80 -138C-18 -178 64 -174 132 -132C194 -94 224 -24 214 46C204 114 154 164 82 184" fill="none" stroke="#ffd36e" stroke-opacity="0.2" stroke-width="16" filter="url(#bigGlow)"/>
    <path d="M92 -12C122 -82 90 -132 36 -144C-18 -156 -62 -126 -76 -74C-92 -14 -54 22 4 36C72 52 102 94 78 136C48 180 -22 190 -74 168C-126 146 -156 94 -164 40C-172 -38 -138 -100 -80 -138C-18 -178 64 -174 132 -132C194 -94 224 -24 214 46C204 114 154 164 82 184" fill="none" stroke="#ffd36e" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowPath)" filter="url(#softGlow)"/>

    <circle cx="0" cy="0" r="86" fill="#72d7ff" fill-opacity="0.13" filter="url(#bigGlow)"/>
    <circle cx="0" cy="0" r="56" fill="url(#core)" filter="url(#softGlow)"/>
    <ellipse cx="-16" cy="-18" rx="20" ry="12" fill="#ffffff" fill-opacity="0.42"/>
    <g fill="none" stroke="#ffffff" stroke-opacity="0.24" stroke-width="0.9">
      <ellipse cx="0" cy="0" rx="56" ry="56"/>
      <ellipse cx="0" cy="0" rx="56" ry="18" transform="rotate(30)"/>
      <ellipse cx="0" cy="0" rx="56" ry="18" transform="rotate(90)"/>
      <ellipse cx="0" cy="0" rx="56" ry="18" transform="rotate(150)"/>
    </g>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="640" y="192" text-anchor="middle" fill="#c8f2ff" font-size="14" font-weight="700">Basin of Attraction</text>
    <text x="640" y="210" text-anchor="middle" fill="#93b8d4" font-size="11">吸引盆地：系统允许波动的正确结构空间</text>

    <text x="640" y="344" text-anchor="middle" fill="#dff8ff" font-size="15" font-weight="700">Attractor</text>
    <text x="640" y="362" text-anchor="middle" fill="#a6c5df" font-size="11">吸引子：当前可执行的架构基线</text>

    <text x="910" y="196" fill="#ffc4d2" font-size="14" font-weight="700">Divergence</text>
    <text x="910" y="214" fill="#d8a2af" font-size="11">AI 扩张力：向外探索更大状态空间</text>

    <text x="916" y="456" fill="#c6f7ff" font-size="14" font-weight="700">Convergence</text>
    <text x="916" y="474" fill="#99cade" font-size="11">工程收敛力：把偏离轨迹拉回盆地</text>

    <text x="248" y="550" fill="#ffe29b" font-size="14" font-weight="700">Development Trajectory</text>
    <text x="248" y="568" fill="#d8c18b" font-size="11">开发轨迹：局部混沌，但整体被约束</text>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <line x1="892" y1="220" x2="786" y2="274" stroke="#ff8aa0" stroke-width="1.5"/>
    <line x1="896" y1="480" x2="786" y2="440" stroke="#72dcff" stroke-width="1.5"/>
    <line x1="430" y1="544" x2="514" y2="500" stroke="#ffd36e" stroke-width="1.5"/>
  </g>

  <g transform="translate(640 650)" font-family="Segoe UI, Arial, sans-serif">
    <text x="0" y="0" text-anchor="middle" fill="#deebfb" font-size="13" font-weight="700">扩张把轨迹推出去，收敛把轨迹拉回来，吸引子决定系统最终落向哪里</text>
    <text x="0" y="22" text-anchor="middle" fill="#8ca3c4" font-size="11" letter-spacing="1.1">DIVERGENCE -> EXCURSION -> CONVERGENCE -> RETURN</text>
  </g>
</svg>
