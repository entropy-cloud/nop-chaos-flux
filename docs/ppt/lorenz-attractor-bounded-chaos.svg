    <circle cx="1144" cy="166" r="1.2"/>
    <circle cx="124" cy="632" r="0.9"/>
    <circle cx="348" cy="594" r="1.1"/>
    <circle cx="1102" cy="582" r="0.8"/>
  </g>
  <g opacity="0.22" stroke="#3e5a7a" stroke-width="1">
