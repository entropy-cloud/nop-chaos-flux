    <line x1="120" y1="440" x2="1160" y2="440"/>
    <line x1="120" y1="580" x2="1160" y2="580"/>
    <line x1="200" y1="120" x2="200" y2="620"/>
    <line x1="440" y1="120" x2="440" y2="620"/>
    <line x1="680" y1="120" x2="680" y2="620"/>
    <line x1="920" y1="120" x2="920" y2="620"/>
  </g>
  <ellipse cx="650" cy="372" rx="332" ry="210" fill="none" stroke="#74d7ff" stroke-opacity="0.22" stroke-width="2.2" stroke-dasharray="10 10"/>
  <ellipse cx="650" cy="372" rx="278" ry="176" fill="none" stroke="#74d7ff" stroke-opacity="0.12" stroke-width="1.2"/>
  <path d="M324 432C302 346 336 254 426 204C526 148 688 144 824 196C920 234 980 306 988 388" fill="none" stroke="#8adfff" stroke-opacity="0.34" stroke-width="2" stroke-dasharray="12 10"/>
