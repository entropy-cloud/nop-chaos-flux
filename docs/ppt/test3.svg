<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif">
  <defs>
    <!-- 深空立体背景渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0D1525"/>
      <stop offset="45%" stop-color="#060C18"/>
      <stop offset="100%" stop-color="#020510"/>
    </radialGradient>

    <!-- 球形吸引子 3D 渐变 -->
    <radialGradient id="attractorGrad" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="12%" stop-color="#E8F4FD" stop-opacity="1"/>
      <stop offset="35%" stop-color="#4FC3F7" stop-opacity="0.95"/>
      <stop offset="65%" stop-color="#0288D1" stop-opacity="0.85"/>
      <stop offset="88%" stop-color="#01579B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#003366" stop-opacity="0.3"/>
    </radialGradient>

    <!-- 收敛力场 3D 渐变 -->
    <radialGradient id="forceFieldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="65%" stop-color="transparent"/>
      <stop offset="82%" stop-color="rgba(0, 180, 230, 0.08)"/>
      <stop offset="92%" stop-color="rgba(0, 160, 220, 0.2)"/>
      <stop offset="100%" stop-color="rgba(0, 120, 200, 0.55)"/>
    </radialGradient>

    <!-- 背景科技网格 -->
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse" patternTransform="scale(1.2) rotate(12)">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(100, 180, 220, 0.06)" stroke-width="0.5"/>
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(130, 210, 240, 0.04)" stroke-width="1" transform="translate(25,25)"/>
    </pattern>

    <!-- 多层发光滤镜 -->
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="24" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="beamGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 能量束渐变 -->
    <linearGradient id="energyRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF5252"/>
      <stop offset="50%" stop-color="#FF1744"/>
      <stop offset="100%" stop-color="#D50000"/>
    </linearGradient>
    <linearGradient id="energyBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#448AFF"/>
      <stop offset="50%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="energyPurple" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E040FB"/>
      <stop offset="50%" stop-color="#D500F9"/>
      <stop offset="100%" stop-color="#6A1B9A"/>
    </linearGradient>
    <linearGradient id="energyCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#18FFFF"/>
      <stop offset="50%" stop-color="#00E5FF"/>
      <stop offset="100%" stop-color="#00838F"/>
    </linearGradient>
    <linearGradient id="energyOrange" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#FF9100"/>
      <stop offset="50%" stop-color="#FF6D00"/>
      <stop offset="100%" stop-color="#C43E00"/>
    </linearGradient>
    <linearGradient id="energyGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69F0AE"/>
      <stop offset="50%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#007B1F"/>
    </linearGradient>
  </defs>

  <!-- ==================== 背景 ==================== -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- 深空星点装饰 -->
  <g opacity="0.35">
    <circle cx="100" cy="80" r="1.2" fill="white"/>
    <circle cx="350" cy="50" r="0.8" fill="white"/>
    <circle cx="600" cy="120" r="1" fill="white"/>
    <circle cx="900" cy="60" r="0.9" fill="white"/>
    <circle cx="1150" cy="90" r="1.1" fill="white"/>
    <circle cx="200" cy="650" r="0.7" fill="white"/>
    <circle cx="800" cy="680" r="1" fill="white"/>
    <circle cx="1050" cy="600" r="0.8" fill="white"/>
    <circle cx="450" cy="630" r="0.9" fill="white"/>
    <circle cx="1200" cy="400" r="1.2" fill="white"/>
    <circle cx="80" cy="300" r="0.6" fill="white"/>
    <circle cx="250" cy="150" r="0.7" fill="white"/>
    <circle cx="1100" cy="250" r="0.8" fill="white"/>
    <circle cx="980" cy="150" r="0.5" fill="white"/>
  </g>

  <!-- ==================== 收敛力场（外层球体） ==================== -->
  <!-- 力场底部阴影（增强 3D 感） -->
  <ellipse cx="640" cy="620" rx="180" ry="30" fill="rgba(0, 120, 200, 0.15)" filter="url(#bigGlow)"/>
  
  <!-- 力场填充 -->
  <circle cx="640" cy="360" r="260" fill="url(#forceFieldGrad)" stroke="rgba(0, 190, 240, 0.3)" stroke-width="2.5" filter="url(#softGlow)"/>

  <!-- 力场外缘光（高亮边界，强化球面 3D 感） -->
  <circle cx="640" cy="360" r="260" fill="none" stroke="rgba(0, 200, 255, 0.45)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="640" cy="360" r="262" fill="none" stroke="rgba(255, 255, 255, 0.2)" stroke-width="0.8"/>

  <!-- 力场经纬线网格结构 -->
  <g opacity="0.35" stroke="rgba(0, 190, 240, 0.25)" fill="none" stroke-width="1.2">
    <!-- 经线（纵向大圆） -->
    <ellipse cx="640" cy="360" rx="260" ry="260"/>
    <ellipse cx="640" cy="360" rx="260" ry="90" transform="rotate(30, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="90" transform="rotate(60, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="90" ry="260" transform="rotate(90, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="90" transform="rotate(120, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="90" transform="rotate(150, 640, 360)"/>
  </g>
  
  <!-- 力场赤道线（增强立体感） -->
  <ellipse cx="640" cy="360" rx="258" ry="70" fill="none" stroke="rgba(0, 220, 255, 0.3)" stroke-width="1.8" stroke-dasharray="12,6" transform="rotate(15, 640, 360)" filter="url(#softGlow)"/>

  <!-- ==================== 扩张力 + 发散能量束 ==================== -->
  <!-- 能量束从中心向外狂野发散 -->
  <g filter="url(#beamGlow)">
    <!-- 主束1 - 红色（右上爆发） -->
    <path d="M640 360 Q680 200 780 180 Q850 170 865 220 Q875 265 840 280" 
          fill="none" stroke="url(#energyRed)" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
    <path d="M640 360 Q700 220 800 190" 
          fill="none" stroke="url(#energyRed)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

    <!-- 主束2 - 蓝色（左上爆发） -->
    <path d="M640 360 Q550 250 450 200 Q400 180 385 230 Q375 275 420 300" 
          fill="none" stroke="url(#energyBlue)" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
    <path d="M640 360 Q580 260 490 210" 
          fill="none" stroke="url(#energyBlue)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

    <!-- 主束3 - 紫色（左下爆发） -->
    <path d="M640 360 Q580 520 500 560 Q450 585 435 540 Q425 490 470 470" 
          fill="none" stroke="url(#energyPurple)" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
    <path d="M640 360 Q600 500 530 540" 
          fill="none" stroke="url(#energyPurple)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

    <!-- 主束4 - 青色（右下爆发） -->
    <path d="M640 360 Q750 480 820 540 Q870 585 865 530 Q855 480 820 450" 
          fill="none" stroke="url(#energyCyan)" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
    <path d="M640 360 Q720 460 780 500" 
          fill="none" stroke="url(#energyCyan)" stroke-width="2.5" opacity="0.5" stroke-linecap="round"/>

    <!-- 次级束1 - 橙色 -->
    <path d="M640 360 Q680 300 760 280 Q820 270 845 310 Q855 350 820 360" 
          fill="none" stroke="url(#energyOrange)" stroke-width="2.5" opacity="0.6"/>
    <path d="M640 360 Q550 400 470 380 Q420 370 405 410 Q395 450 440 460" 
          fill="none" stroke="url(#energyOrange)" stroke-width="2.5" opacity="0.6"/>

    <!-- 次级束2 - 绿色 -->
    <path d="M640 360 Q700 400 780 430 Q840 450 865 410 Q875 370 840 350" 
          fill="none" stroke="url(#energyGreen)" stroke-width="2.5" opacity="0.6"/>
    <path d="M640 360 Q500 480 430 510 Q380 530 365 500 Q355 470 400 450" 
          fill="none" stroke="url(#energyGreen)" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- 能量粒子（发散光点） -->
  <g filter="url(#softGlow)">
    <circle cx="780" cy="200" r="2.8" fill="#FF5252" opacity="0.9"/>
    <circle cx="835" cy="240" r="2" fill="#FF1744" opacity="0.7"/>
    <circle cx="450" cy="220" r="2.8" fill="#448AFF" opacity="0.9"/>
    <circle cx="398" cy="270" r="2" fill="#2979FF" opacity="0.7"/>
    <circle cx="520" cy="570" r="2.8" fill="#E040FB" opacity="0.9"/>
    <circle cx="468" cy="540" r="2" fill="#D500F9" opacity="0.7"/>
    <circle cx="800" cy="530" r="2.8" fill="#18FFFF" opacity="0.9"/>
    <circle cx="852" cy="490" r="2" fill="#00E5FF" opacity="0.7"/>
    <circle cx="760" cy="310" r="1.8" fill="#FF9100" opacity="0.8"/>
    <circle cx="520" cy="380" r="1.8" fill="#FF6D00" opacity="0.8"/>
    <circle cx="680" cy="440" r="1.8" fill="#69F0AE" opacity="0.8"/>
    <circle cx="600" cy="320" r="1.8" fill="#00E676" opacity="0.8"/>
  </g>

  <!-- ==================== 收敛力（内向箭头） ==================== -->
  <!-- 上方收敛力 -->
  <g opacity="0.7">
    <line x1="640" y1="130" x2="640" y2="220" stroke="rgba(0, 210, 255, 0.55)" stroke-width="2.5" stroke-dasharray="8,6"/>
    <polygon points="640,140 634,155 646,155" fill="rgba(0, 210, 255, 0.8)"/>
    <text x="660" y="175" fill="rgba(0, 210, 255, 0.8)" font-size="11" font-weight="500">收敛力</text>
  </g>

  <!-- 下方收敛力 -->
  <g opacity="0.7">
    <line x1="640" y1="590" x2="640" y2="500" stroke="rgba(0, 210, 255, 0.55)" stroke-width="2.5" stroke-dasharray="8,6"/>
    <polygon points="640,580 634,565 646,565" fill="rgba(0, 210, 255, 0.8)"/>
  </g>

  <!-- 左侧收敛力 -->
  <g opacity="0.7">
    <line x1="410" y1="360" x2="500" y2="360" stroke="rgba(0, 210, 255, 0.55)" stroke-width="2.5" stroke-dasharray="8,6"/>
    <polygon points="420,360 435,354 435,366" fill="rgba(0, 210, 255, 0.8)"/>
  </g>

  <!-- 右侧收敛力 -->
  <g opacity="0.7">
    <line x1="870" y1="360" x2="780" y2="360" stroke="rgba(0, 210, 255, 0.55)" stroke-width="2.5" stroke-dasharray="8,6"/>
    <polygon points="860,360 845,354 845,366" fill="rgba(0, 210, 255, 0.8)"/>
  </g>

  <!-- 对角线收敛力 -->
  <line x1="460" y1="170" x2="540" y2="260" stroke="rgba(0, 210, 255, 0.35)" stroke-width="1.5" stroke-dasharray="6,8"/>
  <line x1="820" y1="170" x2="740" y2="260" stroke="rgba(0, 210, 255, 0.35)" stroke-width="1.5" stroke-dasharray="6,8"/>
  <line x1="460" y1="550" x2="540" y2="460" stroke="rgba(0, 210, 255, 0.35)" stroke-width="1.5" stroke-dasharray="6,8"/>
  <line x1="820" y1="550" x2="740" y2="460" stroke="rgba(0, 210, 255, 0.35)" stroke-width="1.5" stroke-dasharray="6,8"/>

  <!-- ==================== 中心球体（吸引子 / 架构基线） ==================== -->
  <!-- 外层大光晕 -->
  <circle cx="640" cy="360" r="85" fill="rgba(79, 195, 247, 0.1)" filter="url(#bigGlow)"/>
  
  <!-- 中层光晕 -->
  <circle cx="640" cy="360" r="65" fill="rgba(79, 195, 247, 0.18)" filter="url(#glow)"/>

  <!-- 核心球体 -->
  <circle cx="640" cy="360" r="55" fill="url(#attractorGrad)" filter="url(#glow)"/>

  <!-- 球体高光（左上方照明，增强 3D 体积感） -->
  <ellipse cx="625" cy="340" rx="28" ry="20" fill="rgba(255, 255, 255, 0.45)" filter="url(#softGlow)"/>
  <ellipse cx="620" cy="335" rx="14" ry="9" fill="rgba(255, 255, 255, 0.7)"/>
  
  <!-- 球体边缘暗部（右下阴影，强化球面感） -->
  <path d="M 670 395 A 50 50 0 0 0 690 370 A 55 55 0 0 1 670 395" fill="rgba(0, 20, 60, 0.4)"/>

  <!-- 球体表面网格线（表现"架构"感） -->
  <g opacity="0.25" stroke="white" fill="none" stroke-width="0.7">
    <ellipse cx="640" cy="360" rx="55" ry="55"/>
    <ellipse cx="640" cy="360" rx="55" ry="18" transform="rotate(30, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="18" transform="rotate(60, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="18" ry="55" transform="rotate(90, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="18" transform="rotate(120, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="18" transform="rotate(150, 640, 360)"/>
  </g>

  <!-- 核心外轨道环 -->
  <ellipse cx="640" cy="360" rx="75" ry="20" fill="none" stroke="rgba(79, 195, 247, 0.45)" stroke-width="1.5" transform="rotate(-20, 640, 360)" filter="url(#softGlow)"/>
  <ellipse cx="640" cy="360" rx="75" ry="20" fill="none" stroke="rgba(224, 64, 251, 0.3)" stroke-width="1" transform="rotate(70, 640, 360)" filter="url(#softGlow)"/>

  <!-- ==================== 系统轨迹（有界混沌路径） ==================== -->
  <path d="M750 300 Q780 260 760 220 Q730 180 690 190 Q650 200 640 250 
           Q620 290 580 270 Q540 250 520 290 Q500 330 530 360 
           Q550 390 520 430 Q490 470 540 490 Q580 510 610 480 
           Q640 450 680 470 Q720 490 750 460 Q780 430 770 390 
           Q760 350 750 300" 
        fill="none" stroke="rgba(255, 200, 100, 0.55)" stroke-width="3" 
        stroke-dasharray="12,6" filter="url(#softGlow)"/>

  <!-- 轨迹上的高亮光点 -->
  <circle cx="750" cy="300" r="3.5" fill="#FFC107" filter="url(#glow)"/>
  <circle cx="570" cy="380" r="3" fill="#FFC107" filter="url(#glow)"/>
  <circle cx="700" cy="460" r="3" fill="#FFC107" filter="url(#glow)"/>
  <circle cx="630" cy="250" r="2.5" fill="#FFD54F" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="540" cy="300" r="2.5" fill="#FFD54F" opacity="0.8" filter="url(#softGlow)"/>

  <!-- ==================== 标注文字 ==================== -->
  
  <!-- 吸引子标注 -->
  <line x1="640" y1="305" x2="640" y2="255" stroke="rgba(79, 195, 247, 0.85)" stroke-width="1.5"/>
  <circle cx="640" cy="290" r="2.5" fill="#4FC3F7"/>
  <g transform="translate(640, 238)">
    <rect x="-55" y="-22" width="110" height="52" rx="6" fill="rgba(5, 15, 30, 0.75)" stroke="rgba(79, 195, 247, 0.4)" stroke-width="1"/>
    <text x="0" y="0" text-anchor="middle" fill="#4FC3F7" font-size="14" font-weight="bold">🌟 吸引子</text>
    <text x="0" y="17" text-anchor="middle" fill="rgba(79, 195, 247, 0.7)" font-size="10">架构基线 · 稳定核心</text>
  </g>

  <!-- AI 扩张力标注 -->
  <g transform="translate(830, 200)">
    <rect x="-12" y="-22" width="130" height="42" rx="6" fill="rgba(255, 82, 82, 0.12)" stroke="rgba(255, 82, 82, 0.5)" stroke-width="1"/>
    <text x="0" y="0" text-anchor="start" fill="#FF5252" font-size="13" font-weight="bold">⚡ AI 扩张力</text>
    <text x="0" y="14" text-anchor="start" fill="rgba(255, 130, 130, 0.7)" font-size="9">Divergence</text>
    <line x1="-20" y1="22" x2="-80" y2="25" stroke="rgba(255, 82, 82, 0.6)" stroke-width="1.5"/>
  </g>

  <!-- 收敛力标注 -->
  <g transform="translate(870, 340)">
    <rect x="-90" y="-22" width="115" height="42" rx="6" fill="rgba(24, 255, 255, 0.1)" stroke="rgba(24, 255, 255, 0.5)" stroke-width="1"/>
    <text x="0" y="0" text-anchor="end" fill="#18FFFF" font-size="13" font-weight="bold">🛡️ 收敛力</text>
    <text x="0" y="14" text-anchor="end" fill="rgba(24, 255, 255, 0.7)" font-size="9">Convergence</text>
    <line x1="20" y1="22" x2="60" y2="25" stroke="rgba(24, 255, 255, 0.6)" stroke-width="1.5"/>
  </g>

  <!-- 约束力场标注 -->
  <g transform="translate(640, 640)">
    <text x="0" y="0" text-anchor="middle" fill="rgba(0, 190, 240, 0.55)" font-size="11" font-weight="500">🛡️ 约束力场 · 能量边界</text>
  </g>

  <!-- 开发轨迹标注 -->
  <g transform="translate(730, 480)">
    <text x="0" y="0" text-anchor="end" fill="#FFC107" font-size="12" font-weight="500">开发轨迹</text>
    <text x="0" y="14" text-anchor="end" fill="rgba(255, 193, 7, 0.55)" font-size="9">有界混沌</text>
    <line x1="-20" y1="8" x2="-70" y2="14" stroke="rgba(255, 193, 7, 0.6)" stroke-width="1.5"/>
  </g>

  <!-- ==================== 底部标题 ==================== -->
  <g transform="translate(640, 700)">
    <rect x="-220" y="-10" width="440" height="38" rx="8" fill="rgba(5, 15, 30, 0.7)" stroke="rgba(0, 180, 240, 0.3)" stroke-width="1"/>
    <text x="0" y="14" text-anchor="middle" fill="white" font-size="16" font-weight="bold" letter-spacing="2">
      受控收敛的动力系统
    </text>
  </g>

  <!-- 右上角标识 -->
  <g transform="translate(1240, 40)" opacity="0.35">
    <text x="0" y="0" text-anchor="end" fill="rgba(79, 195, 247, 0.5)" font-size="10" font-family="monospace">DYNAMIC SYSTEM v2.0</text>
  </g>
</svg>