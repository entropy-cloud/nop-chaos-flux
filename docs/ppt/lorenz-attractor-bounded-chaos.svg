  <circle cx="632" cy="372" r="4.2" fill="#ffffff" filter="url(#softGlow)"/>
  <circle cx="884" cy="502" r="3.2" fill="#7cd7ff" filter="url(#softGlow)"/>
  <circle cx="514" cy="220" r="3.2" fill="#7cd7ff" filter="url(#softGlow)"/>
  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="640" y="86" text-anchor="middle" fill="#f4f9ff" font-size="28" font-weight="700" letter-spacing="1">The Lorenz Attractor</text>
    <text x="640" y="114" text-anchor="middle" fill="#8fb0d8" font-size="14" letter-spacing="2.3">Locally Unpredictable, Globally Bounded</text>
    <text x="640" y="138" text-anchor="middle" fill="#8194b1" font-size="12">洛伦兹吸引子：局部不可预测，但整体有界</text>
    <line x1="910" y1="260" x2="776" y2="326" stroke="url(#accent)" stroke-width="1.6"/>
    <circle cx="776" cy="326" r="3" fill="#7cd7ff"/>
    <text x="920" y="254" fill="#dff8ff" font-size="16" font-weight="700">Development Trajectory</text>
    <text x="920" y="276" fill="#9cc3d8" font-size="12">开发轨迹</text>
    <line x1="368" y1="560" x2="436" y2="520" stroke="#74d7ff" stroke-width="1.6"/>
    <text x="180" y="570" fill="#dff8ff" font-size="16" font-weight="700">Basin of Attraction</text>
    <text x="180" y="592" fill="#9cc3d8" font-size="12">吸引区域</text>
    <text x="640" y="648" text-anchor="middle" fill="#e9f7ff" font-size="18" font-weight="700">Locally Unpredictable, but Globally Bounded</text>
    <text x="640" y="672" text-anchor="middle" fill="#95b4ce" font-size="12">局部混沌、不走直线，但始终被整体结构约束</text>
  </g>
