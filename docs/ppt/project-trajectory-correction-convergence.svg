<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Project Trajectory: Correction and Convergence Over Time</title>
  <desc id="desc">A timeline with an ideal corridor and an energetic actual trajectory that drifts away before correction events pull it back into the bounded channel.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="76%">
      <stop offset="0%" stop-color="#13192f"/>
      <stop offset="60%" stop-color="#0a1020"/>
      <stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <linearGradient id="corridor" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#67d5ff" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#95b7ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#67d5ff" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="trajectory" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#83e6ff"/>
      <stop offset="25%" stop-color="#50d7ff"/>
      <stop offset="55%" stop-color="#ff7d98"/>
      <stop offset="82%" stop-color="#ffd06f"/>
      <stop offset="100%" stop-color="#75ffca"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
