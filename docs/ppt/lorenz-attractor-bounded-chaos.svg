    <path d="M632 372C598 338 534 264 514 220C500 188 512 170 540 174C584 180 636 250 660 318C684 384 680 448 658 496C636 542 592 556 554 536C512 514 508 456 540 404C572 354 632 320 690 314C744 308 796 326 836 362C880 402 898 458 884 502C870 548 828 572 784 560C730 546 690 502 668 444C646 386 646 322 676 270C704 220 752 198 790 206C824 212 838 240 826 268C812 300 780 320 742 328C708 334 670 330 632 372Z" stroke="url(#trace)" stroke-width="4.2" filter="url(#softGlow)"/>
