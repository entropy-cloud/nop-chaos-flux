                        refreshAll();
                    }
                });

                // 全局键盘事件
                document.addEventListener('keydown', handleKeyDown);

                // 公式栏
                formulaInput.addEventListener('focus', function() {
                    if (!state.isEditing && state.activeCell) {
                        startEditing(getCellRawValue(state.activeCell.row, state.activeCell.col));
                    }
                });
                formulaInput.addEventListener('input', function() {
                    if (state.isEditing) {
                        state.editValue = formulaInput.value;
                        if (cellEditor.style.display === 'block') {
                            cellEditor.value = state.editValue;
                        }
                    }
                });
                formulaInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        commitEdit();
                        moveActiveCell(1, 0);
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        cancelEdit();
                        refreshAll();
                    }
                });

                document.getElementById('btn-confirm').addEventListener('click', function() {
                    if (state.isEditing) {
                        commitEdit();
                    }
                });
                document.getElementById('btn-cancel').addEventListener('click', function() {
                    cancelEdit();
                    refreshAll();
                });

                // 单元格编辑器
                cellEditor.addEventListener('input', function() {
                    state.editValue = cellEditor.value;
                    formulaInput.value = state.editValue;
                });
                cellEditor.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        commitEdit();
                        moveActiveCell(1, 0);
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        cancelEdit();
                        refreshAll();
                    } else if (e.key === 'Tab') {
                        e.preventDefault();
                        commitEdit();
                        moveActiveCell(0, 1);
                    }
                });
                cellEditor.addEventListener('blur', function() {
                    if (state.isEditing) {
                        commitEdit();
                    }
                });

                // 工具栏按钮
                document.getElementById('btn-bold').addEventListener('click', toggleBold);
                document.getElementById('btn-italic').addEventListener('click', toggleItalic);
                document.getElementById('btn-underline').addEventListener('click', toggleUnderline);
                document.getElementById('btn-undo').addEventListener('click', undo);
                document.getElementById('btn-redo').addEventListener('click', redo);
                document.getElementById('btn-clear').addEventListener('click', clearActiveCells);

                document.getElementById('text-color').addEventListener('input', function() {
                    applyStyleToSelection('textColor', this.value);
                });
                document.getElementById('bg-color').addEventListener('input', function() {
                    applyStyleToSelection('bgColor', this.value);
                });
                document.getElementById('font-size').addEventListener('change', function() {
                    applyStyleToSelection('fontSize', parseInt(this.value));
                });

                document.getElementById('btn-align-left').addEventListener('click', function() {
                    applyStyleToSelection('align', 'left');
                });
                document.getElementById('btn-align-center').addEventListener('click', function() {
                    applyStyleToSelection('align', 'center');
                });
                document.getElementById('btn-align-right').addEventListener('click', function() {
                    applyStyleToSelection('align', 'right');
                });

                // 工具栏更新
                gridContainer.addEventListener('click', function(e) {
                    if (e.target.closest('td[data-row][data-col]')) {
                        setTimeout(updateToolbarButtons, 50);
                    }
                });
                document.addEventListener('keydown', function(e) {
                    if (e.key.startsWith('Arrow') || e.key === 'Tab') {
                        setTimeout(updateToolbarButtons, 50);
                    }
                });

                // 工作表标签
                sheetTabsDiv.addEventListener('click', function(e) {
                    const tab = e.target.closest('.sheet-tab');
                    if (tab) {
                        const index = parseInt(tab.dataset.index);
                        switchSheet(index);
                    }
                });
                document.getElementById('btn-add-sheet').addEventListener('click', addSheet);

                // 右键菜单
                contextMenu.addEventListener('click', function(e) {
                    const item = e.target.closest('.menu-item');
                    if (item) {
                        handleContextMenuAction(item.dataset.action);
                    }
                });
                document.addEventListener('click', function(e) {
                    if (!contextMenu.contains(e.target)) {
                        hideContextMenu();
                    }
                });

                // 全局点击隐藏右键菜单
                document.addEventListener('contextmenu', function(e) {
                    if (!e.target.closest('#grid-table')) {
                        hideContextMenu();
                    }
                });

                // 窗口大小变化时更新编辑器位置
                window.addEventListener('resize', function() {
                    if (state.isEditing) showCellEditor();
                });
                gridContainer.addEventListener('scroll', function() {
                    if (state.isEditing) showCellEditor();
                });
            }

            // ==================== 启动 ====================
            init();
            console.log('✅ Web Excel 已就绪');
            console.log('  - 支持公式: =SUM(), =AVERAGE(), =MIN(), =MAX(), =COUNT()');
            console.log('  - 快捷键: Ctrl+C/V/X 复制粘贴剪切, Ctrl+Z/Y 撤销重做');
            console.log('  - Ctrl+B/I/U 加粗/斜体/下划线');
            console.log('  - 双击单元格或按Enter编辑, F2编辑');
            console.log('  - 箭头键导航, Shift+点击扩展选区');
            console.log('  - 右键菜单提供更多选项');
            console.log('  - 拖动列头/行头边缘调整列宽行高');
        })();
    </script>
</body>
</html>
