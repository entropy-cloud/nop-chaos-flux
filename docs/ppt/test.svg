<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <!-- 背景渐变 -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#050710"/>
    </radialGradient>

    <!-- 球形吸引子渐变 -->
    <radialGradient id="attractorGrad" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#4fc3f7"/>
      <stop offset="70%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </radialGradient>

    <!-- 收敛力场渐变 -->
    <radialGradient id="forceFieldGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="85%" stop-color="rgba(0, 150, 200, 0.15)"/>
      <stop offset="100%" stop-color="rgba(0, 100, 150, 0.4)"/>
    </radialGradient>

    <!-- 网格纹理 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(100, 150, 200, 0.08)" stroke-width="0.5"/>
    </pattern>

    <!-- 发光滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 能量束渐变面板 -->
    <linearGradient id="energyRed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5252"/>
      <stop offset="100%" stop-color="#ff1744"/>
    </linearGradient>
    <linearGradient id="energyBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#448aff"/>
      <stop offset="100%" stop-color="#2979ff"/>
    </linearGradient>
    <linearGradient id="energyPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e040fb"/>
      <stop offset="100%" stop-color="#d500f9"/>
    </linearGradient>
    <linearGradient id="energyCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18ffff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <linearGradient id="energyOrange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9100"/>
      <stop offset="100%" stop-color="#ff6d00"/>
    </linearGradient>
    <linearGradient id="energyGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#69f0ae"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>

    <!-- 收敛力箭头渐变 -->
    <linearGradient id="convergeArrow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(0, 200, 255, 0)"/>
      <stop offset="100%" stop-color="rgba(0, 200, 255, 0.8)"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1280" height="720" fill="url(#bgGrad)"/>
  <rect width="1280" height="720" fill="url(#grid)"/>

  <!-- 深空的星星点装饰 -->
  <g opacity="0.3">
    <circle cx="100" cy="80" r="1" fill="white"/>
    <circle cx="350" cy="50" r="0.8" fill="white"/>
    <circle cx="600" cy="120" r="1.2" fill="white"/>
    <circle cx="900" cy="60" r="0.7" fill="white"/>
    <circle cx="1150" cy="90" r="1" fill="white"/>
    <circle cx="200" cy="650" r="0.8" fill="white"/>
    <circle cx="800" cy="680" r="1" fill="white"/>
    <circle cx="1050" cy="600" r="0.9" fill="white"/>
    <circle cx="450" cy="630" r="0.6" fill="white"/>
    <circle cx="1200" cy="400" r="1.1" fill="white"/>
  </g>

  <!-- ==================== 外层收敛力场（半透明球体） ==================== -->
  <circle cx="640" cy="360" r="260" fill="url(#forceFieldGrad)" stroke="rgba(0, 180, 230, 0.25)" stroke-width="2" filter="url(#softGlow)"/>

  <!-- 网格球体外层（经线结构）- 表现约束场 -->
  <g opacity="0.4" stroke="rgba(0, 180, 230, 0.2)" fill="none" stroke-width="1">
    <ellipse cx="640" cy="360" rx="260" ry="260"/>
    <ellipse cx="640" cy="360" rx="260" ry="100" transform="rotate(30, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="100" transform="rotate(60, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="100" transform="rotate(90, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="100" transform="rotate(120, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="260" ry="100" transform="rotate(150, 640, 360)"/>
  </g>

  <!-- ==================== 发散能量束（扩张力） ==================== -->
  <!-- 能量束从中心向外狂野发散，但被力场约束 -->

  <!-- 主能量束 1 - 红色 -->
  <path d="M640 360 Q680 200 780 180 Q850 170 860 220 Q870 270 840 280" 
        fill="none" stroke="url(#energyRed)" stroke-width="3" opacity="0.7"/>
  <path d="M640 360 Q700 220 800 190" 
        fill="none" stroke="url(#energyRed)" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>

  <!-- 主能量束 2 - 蓝色 -->
  <path d="M640 360 Q550 250 450 200 Q400 180 390 230 Q380 280 420 300" 
        fill="none" stroke="url(#energyBlue)" stroke-width="3" opacity="0.7"/>
  <path d="M640 360 Q580 260 490 210" 
        fill="none" stroke="url(#energyBlue)" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>

  <!-- 主能量束 3 - 紫色 -->
  <path d="M640 360 Q580 520 500 560 Q450 580 440 540 Q430 490 470 470" 
        fill="none" stroke="url(#energyPurple)" stroke-width="3" opacity="0.7"/>
  <path d="M640 360 Q600 500 530 540" 
        fill="none" stroke="url(#energyPurple)" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>

  <!-- 主能量束 4 - 青色 -->
  <path d="M640 360 Q750 480 820 540 Q870 580 860 530 Q850 480 820 450" 
        fill="none" stroke="url(#energyCyan)" stroke-width="3" opacity="0.7"/>
  <path d="M640 360 Q720 460 780 500" 
        fill="none" stroke="url(#energyCyan)" stroke-width="1.5" opacity="0.4" filter="url(#softGlow)"/>

  <!-- 次级能量束 - 橙色 -->
  <path d="M640 360 Q680 300 760 280 Q820 270 840 310 Q850 350 820 360" 
        fill="none" stroke="url(#energyOrange)" stroke-width="2" opacity="0.5"/>
  <path d="M640 360 Q550 400 470 380 Q420 370 410 410 Q400 450 440 460" 
        fill="none" stroke="url(#energyOrange)" stroke-width="2" opacity="0.5"/>

  <!-- 次级能量束 - 绿色 -->
  <path d="M640 360 Q700 400 780 430 Q840 450 860 410 Q870 370 840 350" 
        fill="none" stroke="url(#energyGreen)" stroke-width="2" opacity="0.5"/>
  <path d="M640 360 Q500 480 430 510 Q380 530 370 500 Q360 470 400 450" 
        fill="none" stroke="url(#energyGreen)" stroke-width="2" opacity="0.5"/>

  <!-- 细小能量粒子（发散的小光点） -->
  <g filter="url(#softGlow)">
    <circle cx="780" cy="200" r="2" fill="#ff5252" opacity="0.8"/>
    <circle cx="830" cy="240" r="1.5" fill="#ff1744" opacity="0.6"/>
    <circle cx="450" cy="220" r="2" fill="#448aff" opacity="0.8"/>
    <circle cx="400" cy="270" r="1.5" fill="#2979ff" opacity="0.6"/>
    <circle cx="520" cy="570" r="2" fill="#e040fb" opacity="0.8"/>
    <circle cx="470" cy="540" r="1.5" fill="#d500f9" opacity="0.6"/>
    <circle cx="800" cy="530" r="2" fill="#18ffff" opacity="0.8"/>
    <circle cx="850" cy="490" r="1.5" fill="#00e5ff" opacity="0.6"/>
  </g>

  <!-- ==================== 收敛力（内向箭头和拉力线） ==================== -->
  <!-- 从力场边缘指向中心的收敛力 -->

  <!-- 上方收敛力 -->
  <g opacity="0.6">
    <line x1="640" y1="130" x2="640" y2="220" stroke="rgba(0, 200, 255, 0.5)" stroke-width="2" stroke-dasharray="8,6"/>
    <polygon points="640,140 634,155 646,155" fill="rgba(0, 200, 255, 0.7)"/>
    <text x="660" y="170" fill="rgba(0, 200, 255, 0.7)" font-size="11" font-weight="500">收敛力</text>
  </g>

  <!-- 下方收敛力 -->
  <g opacity="0.6">
    <line x1="640" y1="590" x2="640" y2="500" stroke="rgba(0, 200, 255, 0.5)" stroke-width="2" stroke-dasharray="8,6"/>
    <polygon points="640,580 634,565 646,565" fill="rgba(0, 200, 255, 0.7)"/>
  </g>

  <!-- 左侧收敛力 -->
  <g opacity="0.6">
    <line x1="410" y1="360" x2="500" y2="360" stroke="rgba(0, 200, 255, 0.5)" stroke-width="2" stroke-dasharray="8,6"/>
    <polygon points="420,360 435,354 435,366" fill="rgba(0, 200, 255, 0.7)"/>
  </g>

  <!-- 右侧收敛力 -->
  <g opacity="0.6">
    <line x1="870" y1="360" x2="780" y2="360" stroke="rgba(0, 200, 255, 0.5)" stroke-width="2" stroke-dasharray="8,6"/>
    <polygon points="860,360 845,354 845,366" fill="rgba(0, 200, 255, 0.7)"/>
  </g>

  <!-- 对角线收敛力 -->
  <line x1="460" y1="170" x2="540" y2="260" stroke="rgba(0, 200, 255, 0.3)" stroke-width="1.5" stroke-dasharray="6,8"/>
  <line x1="820" y1="170" x2="740" y2="260" stroke="rgba(0, 200, 255, 0.3)" stroke-width="1.5" stroke-dasharray="6,8"/>
  <line x1="460" y1="550" x2="540" y2="460" stroke="rgba(0, 200, 255, 0.3)" stroke-width="1.5" stroke-dasharray="6,8"/>
  <line x1="820" y1="550" x2="740" y2="460" stroke="rgba(0, 200, 255, 0.3)" stroke-width="1.5" stroke-dasharray="6,8"/>

  <!-- ==================== 中心球体：吸引子 / 架构基线 ==================== -->
  <!-- 外发光 -->
  <circle cx="640" cy="360" r="80" fill="rgba(79, 195, 247, 0.15)" filter="url(#bigGlow)"/>

  <!-- 核心球体 -->
  <circle cx="640" cy="360" r="55" fill="url(#attractorGrad)" filter="url(#glow)"/>

  <!-- 球体高光 -->
  <ellipse cx="625" cy="340" rx="25" ry="18" fill="rgba(255, 255, 255, 0.4)"/>
  <ellipse cx="620" cy="335" rx="12" ry="8" fill="rgba(255, 255, 255, 0.6)"/>

  <!-- 球体网格线 - 表现"架构"的感觉 -->
  <g opacity="0.3" stroke="white" fill="none" stroke-width="0.8">
    <ellipse cx="640" cy="360" rx="55" ry="55"/>
    <ellipse cx="640" cy="360" rx="55" ry="20" transform="rotate(30, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="20" transform="rotate(60, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="20" transform="rotate(90, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="20" transform="rotate(120, 640, 360)"/>
    <ellipse cx="640" cy="360" rx="55" ry="20" transform="rotate(150, 640, 360)"/>
  </g>

  <!-- ==================== 系统轨迹（有界的混沌路径） ==================== -->
  <!-- 围绕中心的一条混沌但总体受限的轨道 -->
  <path d="M750 300 Q780 260 760 220 Q730 180 690 190 Q650 200 640 250 
           Q620 290 580 270 Q540 250 520 290 Q500 330 530 360 
           Q550 390 520 430 Q490 470 540 490 Q580 510 610 480 
           Q640 450 680 470 Q720 490 750 460 Q780 430 770 390 
           Q760 350 750 300" 
        fill="none" stroke="rgba(255, 200, 100, 0.6)" stroke-width="2.5" 
        stroke-dasharray="10,5" filter="url(#softGlow)"/>

  <!-- 轨迹上的光点 -->
  <circle cx="750" cy="300" r="3" fill="#ffc107" filter="url(#glow)"/>
  <circle cx="570" cy="380" r="2.5" fill="#ffc107" filter="url(#glow)"/>
  <circle cx="700" cy="460" r="2.5" fill="#ffc107" filter="url(#glow)"/>

  <!-- ==================== 标注文字 ==================== -->

  <!-- 吸引子标注 -->
  <line x1="640" y1="305" x2="640" y2="260" stroke="rgba(79, 195, 247, 0.8)" stroke-width="1.5"/>
  <circle cx="640" cy="290" r="2" fill="#4fc3f7"/>
  <g transform="translate(640, 245)">
    <text x="0" y="0" text-anchor="middle" fill="#4fc3f7" font-size="14" font-weight="bold">吸引子</text>
    <text x="0" y="16" text-anchor="middle" fill="rgba(79, 195, 247, 0.7)" font-size="11">Attractor</text>
    <text x="0" y="32" text-anchor="middle" fill="rgba(200, 200, 220, 0.5)" font-size="10">架构基线 · 稳定核心</text>
  </g>

  <!-- 扩张力标注 -->
  <g transform="translate(830, 200)">
    <text x="0" y="0" text-anchor="start" fill="#ff5252" font-size="13" font-weight="bold">AI 扩张力</text>
    <text x="0" y="15" text-anchor="start" fill="rgba(255, 82, 82, 0.7)" font-size="10">Divergence</text>
    <line x1="-20" y1="22" x2="-80" y2="25" stroke="rgba(255, 82, 82, 0.6)" stroke-width="1.5"/>
  </g>

  <!-- 收敛力标注 -->
  <g transform="translate(870, 340)">
    <text x="0" y="0" text-anchor="end" fill="#18ffff" font-size="13" font-weight="bold">收敛力</text>
    <text x="0" y="15" text-anchor="end" fill="rgba(24, 255, 255, 0.7)" font-size="10">Convergence</text>
    <line x1="20" y1="22" x2="60" y2="25" stroke="rgba(24, 255, 255, 0.6)" stroke-width="1.5"/>
  </g>

  <!-- 力场约束标注 -->
  <g transform="translate(640, 640)">
    <text x="0" y="0" text-anchor="middle" fill="rgba(0, 180, 230, 0.6)" font-size="10">约束力场 · 能量边界</text>
  </g>

  <!-- 系统轨迹标注 -->
  <g transform="translate(730, 480)">
    <text x="0" y="0" text-anchor="end" fill="#ffc107" font-size="11" font-weight="500">开发轨迹</text>
    <line x1="-20" y1="6" x2="-70" y2="12" stroke="rgba(255, 193, 7, 0.6)" stroke-width="1"/>
  </g>

  <!-- ==================== 底部标题 ==================== -->
  <g transform="translate(640, 700)">
    <text x="0" y="0" text-anchor="middle" fill="white" font-size="18" font-weight="bold" letter-spacing="1">
      受控收敛的动力系统
    </text>
    <text x="0" y="22" text-anchor="middle" fill="rgba(200, 200, 220, 0.6)" font-size="13" letter-spacing="2" font-style="italic">
      The Dynamics of Controlled Convergence
    </text>
  </g>

  <!-- 右上角装饰标识 -->
  <g transform="translate(1240, 40)" opacity="0.4">
    <text x="0" y="0" text-anchor="end" fill="rgba(79, 195, 247, 0.5)" font-size="10" font-family="monospace">DYNAMIC SYSTEM v1.0</text>
  </g>

</svg>

