<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Excel - 在线电子表格</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --header-bg: #f0f0f0;
            --header-border: #d0d0d0;
            --cell-border: #e0e0e0;
            --selected-bg: #d4e4f7;
            --active-border: #1a73e8;
            --active-cell-bg: #e8f0fe;
            --toolbar-bg: #f8f9fa;
            --toolbar-border: #dadce0;
            --text-color: #202124;
            --header-text: #5f6368;
            --hover-bg: #f1f3f4;
            --button-hover: #e8eaed;
            --formula-bg: #fff;
            --tab-active: #fff;
            --tab-inactive: #e8eaed;
            --resize-handle: #c0c0c0;
            --status-bg: #f8f9fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            font-size: 14px;
            color: var(--text-color);
            background: #e8eaed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            max-width: 1400px;
            max-height: 95vh;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }

        /* 工具栏 */
        #toolbar {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            background: var(--toolbar-bg);
            border-bottom: 1px solid var(--toolbar-border);
            flex-shrink: 0;
            flex-wrap: wrap;
            min-height: 42px;
        }
        #toolbar .sep {
            width: 1px;
            height: 24px;
            background: #d0d0d0;
            margin: 0 4px;
            flex-shrink: 0;
        }
        #toolbar button {
            padding: 6px 10px;
            border: 1px solid transparent;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            color: #444;
            white-space: nowrap;
            transition: all 0.12s;
            display: flex;
            align-items: center;
            gap: 3px;
            flex-shrink: 0;
        }
        #toolbar button:hover {
            background: var(--button-hover);
            border-color: #c0c0c0;
        }
        #toolbar button:active {
            background: #d0d4d8;
        }
        #toolbar button.active {
            background: #d4e4f7;
            border-color: #a0b4d0;
            color: #1a56c4;
            font-weight: 600;
        }
        #toolbar button .icon {
            font-size: 15px;
            line-height: 1;
        }
        #toolbar input[type="color"] {
            width: 28px;
            height: 26px;
            border: 1px solid #c0c0c0;
            border-radius: 3px;
            cursor: pointer;
            padding: 1px;
            flex-shrink: 0;
        }
        #toolbar select {
            padding: 5px 8px;
            border: 1px solid #c0c0c0;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            background: #fff;
            flex-shrink: 0;
        }

        /* 公式栏 */
        #formula-bar {
            display: flex;
            align-items: center;
            padding: 4px 8px;
            background: #fff;
            border-bottom: 1px solid var(--toolbar-border);
            flex-shrink: 0;
            gap: 6px;
            min-height: 34px;
        }
        #cell-ref {
            width: 70px;
            min-width: 60px;
            padding: 4px 8px;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            text-align: center;
            font-weight: 600;
            font-size: 13px;
            background: #fafafa;
            color: #333;
            flex-shrink: 0;
            cursor: default;
        }
        #fx-label {
            font-weight: 700;
            color: #666;
            font-style: italic;
            flex-shrink: 0;
            font-size: 14px;
        }
        #formula-input {
            flex: 1;
            padding: 5px 10px;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            font-size: 13px;
            font-family: 'Consolas', 'SF Mono', 'Fira Code', 'PingFang SC', monospace;
            outline: none;
            background: #fff;
            min-width: 150px;
        }
        #formula-input:focus {
            border-color: var(--active-border);
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.15);
        }
        #btn-confirm,
        #btn-cancel {
            width: 28px;
            height: 26px;
            border: 1px solid #d0d0d0;
            border-radius: 3px;
            cursor: pointer;
            font-size: 13px;
            background: #fff;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #btn-confirm:hover {
            background: #e6f4ea;
            border-color: #34a853;
        }
        #btn-cancel:hover {
            background: #fce8e6;
            border-color: #ea4335;
        }

        /* 表格容器 */
        #grid-container {
            flex: 1;
            overflow: auto;
            position: relative;
            background: #fff;
            cursor: cell;
        }
        #grid-table {
            border-collapse: collapse;
            table-layout: fixed;
            min-width: 100%;
        }
        #grid-table th,
        #grid-table td {
            border: 1px solid var(--cell-border);
            padding: 0;
            position: relative;
        }
        /* 列头 */
        #grid-table thead th {
            background: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center;
            font-weight: 500;
            font-size: 12px;
            color: var(--header-text);
            height: 28px;
            min-width: 80px;
            cursor: default;
            border-bottom: 2px solid #c0c0c0;
            padding: 0 2px;
        }
        /* 行头 */
        #grid-table tbody th {
            background: var(--header-bg);
            position: sticky;
            left: 0;
            z-index: 5;
            text-align: center;
            font-weight: 500;
            font-size: 12px;
            color: var(--header-text);
            width: 50px;
            min-width: 50px;
            cursor: default;
            border-right: 2px solid #c0c0c0;
            padding: 0 2px;
        }
        /* 左上角 */
        #grid-table thead th.corner {
            position: sticky;
            top: 0;
            left: 0;
            z-index: 20;
            background: #e8e8e8;
            width: 50px;
            min-width: 50px;
            border-right: 2px solid #c0c0c0;
            border-bottom: 2px solid #c0c0c0;
            cursor: default;
        }
        /* 数据单元格 */
        #grid-table tbody td {
            height: 26px;
            cursor: cell;
            font-size: 13px;
            padding: 0 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #fff;
            transition: background 0.05s;
        }
        #grid-table tbody td:hover {
            background: #f8f9fa;
        }
        /* 选中状态 */
        #grid-table tbody td.selected {
            background: var(--selected-bg);
        }
        #grid-table tbody td.active-cell {
            background: var(--active-cell-bg);
            outline: 2px solid var(--active-border);
            outline-offset: -1px;
            z-index: 3;
            position: relative;
        }
        /* 列宽调整手柄 */
        .col-resize-handle {
            position: absolute;
            right: -3px;
            top: 0;
            bottom: 0;
            width: 7px;
            cursor: col-resize;
            z-index: 15;
            background: transparent;
        }
        .col-resize-handle:hover,
        .col-resize-handle.active {
            background: var(--active-border);
            opacity: 0.6;
        }
        /* 行高调整手柄 */
        .row-resize-handle {
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 7px;
            cursor: row-resize;
            z-index: 6;
            background: transparent;
        }
        .row-resize-handle:hover,
        .row-resize-handle.active {
            background: var(--active-border);
            opacity: 0.6;
        }

        /* 单元格编辑覆盖层 */
        #cell-editor {
            position: absolute;
            border: 2px solid var(--active-border);
            outline: none;
            font-size: 13px;
            font-family: 'Consolas', 'SF Mono', 'Fira Code', 'PingFang SC', monospace;
            padding: 0 4px;
            z-index: 50;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
            display: none;
            white-space: nowrap;
            overflow: hidden;
            resize: none;
        }

        /* 底部标签栏 */
        #sheet-tabs-bar {
            display: flex;
            align-items: center;
            background: #f0f0f0;
            border-top: 1px solid #d0d0d0;
            padding: 0 8px;
            flex-shrink: 0;
            gap: 2px;
            min-height: 32px;
            overflow-x: auto;
        }
        .sheet-tab {
            padding: 6px 16px;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-size: 12px;
            background: var(--tab-inactive);
            border: 1px solid #c0c0c0;
            border-bottom: none;
            white-space: nowrap;
            transition: all 0.1s;
            position: relative;
            top: -1px;
            color: #555;
        }
        .sheet-tab:hover {
            background: #ddd;
        }
        .sheet-tab.active {
            background: var(--tab-active);
            font-weight: 600;
            color: #1a56c4;
            border-color: #a0b4d0;
            border-bottom: 2px solid #fff;
            z-index: 1;
            padding-bottom: 7px;
            top: -2px;
        }
        #btn-add-sheet {
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 50%;
            font-size: 16px;
            font-weight: bold;
            background: transparent;
            border: 1px solid transparent;
            color: #666;
            flex-shrink: 0;
            margin-left: 4px;
            line-height: 1;
        }
        #btn-add-sheet:hover {
            background: #ddd;
            border-color: #bbb;
        }

        /* 状态栏 */
        #status-bar {
            display: flex;
            align-items: center;
            padding: 3px 12px;
            background: var(--status-bg);
            border-top: 1px solid #e0e0e0;
            font-size: 11px;
            color: #888;
            flex-shrink: 0;
            gap: 16px;
            min-height: 26px;
        }
        #status-bar span {
            white-space: nowrap;
        }

        /* 滚动条美化 */
        #grid-container::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }
        #grid-container::-webkit-scrollbar-track {
            background: #f5f5f5;
            border-radius: 5px;
        }
        #grid-container::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border-radius: 5px;
            border: 2px solid #f5f5f5;
        }
        #grid-container::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }
        #grid-container::-webkit-scrollbar-corner {
            background: #f5f5f5;
        }

        /* 右键菜单 */
        #context-menu {
            position: fixed;
            background: #fff;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.16);
            z-index: 100;
            display: none;
            padding: 4px 0;
            min-width: 160px;
        }
        #context-menu .menu-item {
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #333;
            transition: background 0.08s;
        }
        #context-menu .menu-item:hover {
            background: #e8f0fe;
            color: #1a56c4;
        }
        #context-menu .menu-sep {
            height: 1px;
            background: #e0e0e0;
            margin: 4px 0;
        }
    </style>
</head>
<body>

    <div id="app">
        <!-- 工具栏 -->
        <div id="toolbar">
            <button id="btn-bold" title="加粗 (Ctrl+B)"><span class="icon"><b>B</b></span></button>
            <button id="btn-italic" title="斜体 (Ctrl+I)"><span class="icon"><i>I</i></span></button>
            <button id="btn-underline" title="下划线 (Ctrl+U)"><span class="icon"><u>U</u></span></button>
            <span class="sep"></span>
            <span style="font-size:12px;color:#666;flex-shrink:0;">文字色</span>
            <input type="color" id="text-color" value="#000000" title="文字颜色">
            <span style="font-size:12px;color:#666;flex-shrink:0;">背景色</span>
            <input type="color" id="bg-color" value="#ffffff" title="背景颜色">
            <span class="sep"></span>
            <span style="font-size:12px;color:#666;flex-shrink:0;">字号</span>
            <select id="font-size" title="字体大小">
                <option value="10">10</option>
                <option value="11">11</option>
                <option value="12">12</option>
                <option value="13" selected>13</option>
                <option value="14">14</option>
                <option value="16">16</option>
                <option value="18">18</option>
                <option value="20">20</option>
                <option value="24">24</option>
            </select>
            <span class="sep"></span>
            <button id="btn-align-left" title="左对齐">≡左</button>
            <button id="btn-align-center" title="居中">≡中</button>
            <button id="btn-align-right" title="右对齐">≡右</button>
            <span class="sep"></span>
            <button id="btn-undo" title="撤销 (Ctrl+Z)">↩ 撤销</button>
            <button id="btn-redo" title="重做 (Ctrl+Y)">↪ 重做</button>
            <span class="sep"></span>
            <button id="btn-clear" title="清除选中单元格">🗑 清除</button>
        </div>

        <!-- 公式栏 -->
        <div id="formula-bar">
            <div id="cell-ref">A1</div>
            <span id="fx-label">fx</span>
            <input type="text" id="formula-input" placeholder="输入内容或公式 (如 =SUM(A1:A5))" spellcheck="false">
            <button id="btn-confirm" title="确认">✓</button>
            <button id="btn-cancel" title="取消">✗</button>
        </div>

        <!-- 表格容器 -->
        <div id="grid-container">
            <table id="grid-table">
                <thead></thead>
                <tbody></tbody>
            </table>
            <input type="text" id="cell-editor">
        </div>

        <!-- 工作表标签 -->
        <div id="sheet-tabs-bar">
            <span style="font-size:11px;color:#888;flex-shrink:0;margin-right:4px;">工作表:</span>
            <div id="sheet-tabs"></div>
            <button id="btn-add-sheet" title="添加工作表">+</button>
        </div>

        <!-- 状态栏 -->
        <div id="status-bar">
            <span id="status-cell">就绪</span>
            <span id="status-sum"></span>
            <span>提示: 箭头导航 | Enter编辑 | Tab右移 | Ctrl+C/V复制粘贴 | =开头输入公式</span>
        </div>

        <!-- 右键菜单 -->
        <div id="context-menu">
            <div class="menu-item" data-action="cut">✂ 剪切</div>
            <div class="menu-item" data-action="copy">📋 复制</div>
            <div class="menu-item" data-action="paste">📄 粘贴</div>
            <div class="menu-sep"></div>
            <div class="menu-item" data-action="clear">🗑 清除内容</div>
            <div class="menu-sep"></div>
            <div class="menu-item" data-action="insert-row">➕ 插入行</div>
            <div class="menu-item" data-action="delete-row">➖ 删除行</div>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 常量 ====================
            const TOTAL_ROWS = 200;
            const TOTAL_COLS = 30; // A 到 AD (30列)
            const DEFAULT_COL_WIDTH = 90;
            const DEFAULT_ROW_HEIGHT = 26;
            const COL_HEADER_CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

            // ==================== DOM引用 ====================
            const gridContainer = document.getElementById('grid-container');
            const gridTable = document.getElementById('grid-table');
            const gridThead = gridTable.querySelector('thead');
            const gridTbody = gridTable.querySelector('tbody');
            const cellEditor = document.getElementById('cell-editor');
            const cellRef = document.getElementById('cell-ref');
            const formulaInput = document.getElementById('formula-input');
            const statusCell = document.getElementById('status-cell');
            const statusSum = document.getElementById('status-sum');
            const contextMenu = document.getElementById('context-menu');
            const sheetTabsDiv = document.getElementById('sheet-tabs');

            // ==================== 工具函数 ====================
            function colIndexToLetter(idx) {
                if (idx < 26) return COL_HEADER_CHARS[idx];
                return COL_HEADER_CHARS[Math.floor(idx / 26) - 1] + COL_HEADER_CHARS[idx % 26];
            }

            function colLetterToIndex(letter) {
                letter = letter.toUpperCase();
                if (letter.length === 1) return COL_HEADER_CHARS.indexOf(letter);
                return (COL_HEADER_CHARS.indexOf(letter[0]) + 1) * 26 + COL_HEADER_CHARS.indexOf(letter[1]);
            }

            function cellKeyToRowCol(key) {
                const match = key.match(/^([A-Z]+)(\d+)$/i);
                if (!match) return null;
                return {
                    row: parseInt(match[2]),
                    col: colLetterToIndex(match[1])
                };
            }

            function rowColToCellKey(row, col) {
                return colIndexToLetter(col) + row;
            }

            function parseRange(rangeStr) {
                const parts = rangeStr.split(':');
                if (parts.length !== 2) return null;
                const start = cellKeyToRowCol(parts[0].trim());
                const end = cellKeyToRowCol(parts[1].trim());
                if (!start || !end) return null;
                return {
                    startRow: Math.min(start.row, end.row),
                    endRow: Math.max(start.row, end.row),
                    startCol: Math.min(start.col, end.col),
                    endCol: Math.max(start.col, end.col),
                };
            }

            function getCellsInRange(range) {
                const cells = [];
                for (let r = range.startRow; r <= range.endRow; r++) {
                    for (let c = range.startCol; c <= range.endCol; c++) {
                        cells.push(rowColToCellKey(r, c));
                    }
                }
                return cells;
            }

            // ==================== 状态管理 ====================
            const state = {
                sheets: [], // 每个sheet: { name, cells: { cellKey: { raw, computed, style } }, colWidths: {}, rowHeights: {} }
                activeSheetIndex: 0,
                activeCell: { row: 1, col: 0 }, // 当前活动单元格
                selectionStart: null, // 选择范围起始
                selectionEnd: null, // 选择范围结束
                isEditing: false,
                editValue: '',
                clipboard: null, // { cells: { cellKey: {raw, style} }, width, height }
                clipboardMode: null, // 'copy' | 'cut'
                undoStack: [],
                redoStack: [],
                maxUndo: 100,
                isDragging: false,
                dragStartCell: null,
                colResizing: null, // { colIndex, startX, startWidth }
                rowResizing: null, // { rowIndex, startY, startHeight }
            };

            function getCurrentSheet() {
                if (!state.sheets[state.activeSheetIndex]) {
                    state.sheets[state.activeSheetIndex] = createEmptySheet('Sheet' + (state.activeSheetIndex +
                        1));
                }
                return state.sheets[state.activeSheetIndex];
            }

            function createEmptySheet(name) {
                return {
                    name: name,
                    cells: {},
                    colWidths: {},
                    rowHeights: {},
                };
            }

            function getCellData(row, col, sheet) {
                sheet = sheet || getCurrentSheet();
                const key = rowColToCellKey(row, col);
                return sheet.cells[key] || null;
            }

            function getOrCreateCellData(row, col, sheet) {
                sheet = sheet || getCurrentSheet();
                const key = rowColToCellKey(row, col);
                if (!sheet.cells[key]) {
                    sheet.cells[key] = {
                        raw: '',
                        computed: '',
                        style: {
                            bold: false,
                            italic: false,
                            underline: false,
                            textColor: '#000000',
                            bgColor: '#ffffff',
                            fontSize: 13,
                            align: 'left',
                        },
                    };
                }
                return sheet.cells[key];
            }

            function getCellDisplayValue(row, col, sheet) {
                const data = getCellData(row, col, sheet);
                if (!data) return '';
                if (data.computed !== '' && data.computed !== null && data.computed !== undefined) {
                    return String(data.computed);
                }
                return data.raw;
            }

            function getCellRawValue(row, col, sheet) {
                const data = getCellData(row, col, sheet);
                if (!data) return '';
                return data.raw;
            }

            // ==================== 公式求值 ====================
            function evaluateFormula(formula, sheet) {
                if (!formula || !formula.startsWith('=')) return formula;
                const expr = formula.substring(1).trim();
                if (!expr) return '';
                try {
                    return evaluateExpression(expr, sheet, new Set());
                } catch (e) {
                    return '#ERROR';
                }
            }

            function evaluateExpression(expr, sheet, visited) {
                // 处理函数调用
                let processed = expr;
                const funcRegex = /(SUM|AVERAGE|MIN|MAX|COUNT|COUNTA)\s*\(([^)]*)\)/gi;
                let match;
                while ((match = funcRegex.exec(processed)) !== null) {
                    const funcName = match[1].toUpperCase();
                    const argsStr = match[2];
                    const result = evaluateFunction(funcName, argsStr, sheet, visited);
                    // 替换整个函数调用
                    processed = processed.substring(0, match.index) + result + processed.substring(match.index +
                        match[0].length);
                    // 重置regex
                    funcRegex.lastIndex = 0;
                }

                // 替换单元格引用
                const cellRefRegex = /\b([A-Z]+)(\d+)\b/g;
                let cellMatch;
                const replacements = [];
                while ((cellMatch = cellRefRegex.exec(processed)) !== null) {
                    const refKey = cellMatch[0].toUpperCase();
                    const rc = cellKeyToRowCol(refKey);
                    if (rc) {
                        const cellKey = rowColToCellKey(rc.row, rc.col);
                        if (visited.has(cellKey)) return '#CIRCULAR';
                        visited.add(cellKey);
                        const cellData = sheet.cells[cellKey];
                        let val = 0;
                        if (cellData) {
                            const raw = cellData.raw;
                            if (raw && raw.startsWith('=')) {
                                const subExpr = raw.substring(1).trim();
                                val = parseFloat(evaluateExpression(subExpr, sheet, new Set(visited))) || 0;
                            } else {
                                val = parseFloat(raw) || 0;
                            }
                        }
                        replacements.push({ index: cellMatch.index, length: cellMatch[0].length, value: val,
                            key: refKey });
                    }
                }
                // 从后往前替换
                replacements.sort((a, b) => b.index - a.index);
                for (const rep of replacements) {
                    processed = processed.substring(0, rep.index) + rep.value + processed.substring(rep.index + rep
                        .length);
                }

                // 验证剩余表达式安全
                const safeCheck = processed.replace(/[\d+\-*/().%\s]/g, '');
                if (safeCheck.length > 0 && !/^[+\-]?\d/.test(safeCheck)) {
                    // 可能还有未处理的引用
                    if (/^[A-Z]+\d+$/i.test(safeCheck.trim())) return '#REF?';
                }

                // 计算
                if (/^[\d+\-*/().%\s]+$/.test(processed) && processed.trim()) {
                    const result = new Function('return (' + processed + ')')();
                    if (isNaN(result) || !isFinite(result)) return '#NUM!';
                    return result;
                }
                if (processed.trim() === '') return 0;
                return processed;
            }

            function evaluateFunction(funcName, argsStr, sheet, visited) {
                const args = argsStr.split(',').map(s => s.trim());
                let allValues = [];

                for (const arg of args) {
                    if (arg.includes(':')) {
                        // 范围
                        const range = parseRange(arg);
                        if (range) {
                            const cellKeys = getCellsInRange(range);
                            for (const ck of cellKeys) {
                                if (visited.has(ck)) continue;
                                visited.add(ck);
                                const cd = sheet.cells[ck];
                                if (cd && cd.raw && cd.raw.startsWith('=')) {
                                    const subVal = evaluateExpression(cd.raw.substring(1).trim(), sheet, new Set(
                                        visited));
                                    allValues.push(parseFloat(subVal) || (isNaN(parseFloat(subVal)) ? subVal :
                                        0));
                                } else if (cd) {
                                    const n = parseFloat(cd.raw);
                                    allValues.push(isNaN(n) ? cd.raw : n);
                                } else {
                                    allValues.push(0);
                                }
                            }
                        }
                    } else {
                        // 单个引用或字面量
                        const rc = cellKeyToRowCol(arg);
                        if (rc) {
                            const ck = rowColToCellKey(rc.row, rc.col);
                            if (visited.has(ck)) continue;
                            visited.add(ck);
                            const cd = sheet.cells[ck];
                            if (cd && cd.raw && cd.raw.startsWith('=')) {
                                const subVal = evaluateExpression(cd.raw.substring(1).trim(), sheet, new Set(visited));
                                allValues.push(parseFloat(subVal) || (isNaN(parseFloat(subVal)) ? subVal : 0));
                            } else if (cd) {
                                const n = parseFloat(cd.raw);
                                allValues.push(isNaN(n) ? cd.raw : n);
                            } else {
                                allValues.push(0);
                            }
                        } else {
                            const n = parseFloat(arg);
                            allValues.push(isNaN(n) ? arg : n);
                        }
                    }
                }

                switch (funcName) {
                    case 'SUM': {
                        const nums = allValues.filter(v => typeof v === 'number');
                        return nums.reduce((a, b) => a + b, 0);
                    }
                    case 'AVERAGE': {
                        const nums = allValues.filter(v => typeof v === 'number');
                        return nums.length === 0 ? '#DIV/0!' : nums.reduce((a, b) => a + b, 0) / nums.length;
                    }
                    case 'MIN': {
                        const nums = allValues.filter(v => typeof v === 'number');
                        return nums.length === 0 ? 0 : Math.min(...nums);
                    }
                    case 'MAX': {
                        const nums = allValues.filter(v => typeof v === 'number');
                        return nums.length === 0 ? 0 : Math.max(...nums);
                    }
                    case 'COUNT': {
                        return allValues.filter(v => typeof v === 'number').length;
                    }
                    case 'COUNTA': {
                        return allValues.filter(v => v !== 0 && v !== '' && v !== null && v !== undefined).length;
                    }
                    default:
                        return '#NAME?';
                }
            }

            function recalculateSheet(sheet) {
                for (const key in sheet.cells) {
                    const cell = sheet.cells[key];
                    if (cell.raw && cell.raw.startsWith('=')) {
                        cell.computed = evaluateFormula(cell.raw, sheet);
                    } else {
                        cell.computed = cell.raw;
                    }
                }
            }

            function updateCellAndRecalculate(row, col, rawValue, sheet) {
                sheet = sheet || getCurrentSheet();
                const cellData = getOrCreateCellData(row, col, sheet);
                cellData.raw = rawValue;
                if (rawValue && rawValue.startsWith('=')) {
                    cellData.computed = evaluateFormula(rawValue, sheet);
                } else {
                    cellData.computed = rawValue;
                }
                // 重新计算整个工作表（处理依赖）
                recalculateSheet(sheet);
            }

            // ==================== 撤销/重做 ====================
            function pushUndo(action) {
                state.undoStack.push(action);
                if (state.undoStack.length > state.maxUndo) state.undoStack.shift();
                state.redoStack = [];
            }

            function undo() {
                if (state.undoStack.length === 0) return;
                const action = state.undoStack.pop();
                state.redoStack.push(action);
                applyUndoAction(action, true);
                refreshAll();
            }

            function redo() {
                if (state.redoStack.length === 0) return;
                const action = state.redoStack.pop();
                state.undoStack.push(action);
                applyUndoAction(action, false);
                refreshAll();
            }

            function applyUndoAction(action, isUndo) {
                const sheet = state.sheets[action.sheetIndex];
                if (!sheet) return;
                const data = isUndo ? action.oldData : action.newData;
                for (const key in data) {
                    if (data[key] === null) {
                        delete sheet.cells[key];
                    } else {
                        sheet.cells[key] = JSON.parse(JSON.stringify(data[key]));
                    }
                }
                recalculateSheet(sheet);
            }

            function saveCellState(row, col) {
                const sheet = getCurrentSheet();
                const key = rowColToCellKey(row, col);
                const oldData = {};
                if (sheet.cells[key]) {
                    oldData[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                } else {
                    oldData[key] = null;
                }
                return {
                    sheetIndex: state.activeSheetIndex,
                    oldData: oldData,
                    newData: null,
                };
            }

            // ==================== 渲染 ====================
            function buildGrid() {
                // 构建列头
                let theadHTML = '<tr><th class="corner"></th>';
                for (let c = 0; c < TOTAL_COLS; c++) {
                    const letter = colIndexToLetter(c);
                    const width = getCurrentSheet().colWidths[c] || DEFAULT_COL_WIDTH;
                    theadHTML +=
                        `<th data-col="${c}" style="width:${width}px;min-width:${width}px;">${letter}<span class="col-resize-handle" data-col="${c}"></span></th>`;
                }
                theadHTML += '</tr>';
                gridThead.innerHTML = theadHTML;

                // 构建表体
                let tbodyHTML = '';
                for (let r = 1; r <= TOTAL_ROWS; r++) {
                    const rowHeight = getCurrentSheet().rowHeights[r] || DEFAULT_ROW_HEIGHT;
                    tbodyHTML += `<tr data-row="${r}" style="height:${rowHeight}px;">`;
                    tbodyHTML +=
                        `<th data-row="${r}" style="height:${rowHeight}px;">${r}<span class="row-resize-handle" data-row="${r}"></span></th>`;
                    for (let c = 0; c < TOTAL_COLS; c++) {
                        const key = rowColToCellKey(r, c);
                        const cellData = getCellData(r, c);
                        const displayVal = getCellDisplayValue(r, c);
                        let styleStr = '';
                        let classes = '';
                        if (cellData && cellData.style) {
                            const s = cellData.style;
                            styleStr = `font-weight:${s.bold?'bold':'normal'};font-style:${s.italic?'italic':'normal'};text-decoration:${s.underline?'underline':'none'};color:${s.textColor||'#000'};background-color:${s.bgColor||'#fff'};font-size:${s.fontSize||13}px;text-align:${s.align||'left'};`;
                        }
                        // 检查是否在选中范围内
                        if (isCellInSelection(r, c)) {
                            classes += ' selected';
                        }
                        if (state.activeCell && state.activeCell.row === r && state.activeCell.col === c) {
                            classes += ' active-cell';
                        }
                        const width = getCurrentSheet().colWidths[c] || DEFAULT_COL_WIDTH;
                        tbodyHTML +=
                            `<td data-row="${r}" data-col="${c}" data-key="${key}" class="${classes}" style="width:${width}px;min-width:${width}px;${styleStr}">${escapeHtml(String(displayVal))}</td>`;
                    }
                    tbodyHTML += '</tr>';
                }
                gridTbody.innerHTML = tbodyHTML;
            }

            function isCellInSelection(row, col) {
                if (!state.selectionStart || !state.selectionEnd) return false;
                const sr = Math.min(state.selectionStart.row, state.selectionEnd.row);
                const er = Math.max(state.selectionStart.row, state.selectionEnd.row);
                const sc = Math.min(state.selectionStart.col, state.selectionEnd.col);
                const ec = Math.max(state.selectionStart.col, state.selectionEnd.col);
                return row >= sr && row <= er && col >= sc && col <= ec;
            }

            function getSelectionRange() {
                if (!state.selectionStart || !state.selectionEnd) {
                    if (state.activeCell) {
                        return {
                            startRow: state.activeCell.row,
                            endRow: state.activeCell.row,
                            startCol: state.activeCell.col,
                            endCol: state.activeCell.col,
                        };
                    }
                    return null;
                }
                return {
                    startRow: Math.min(state.selectionStart.row, state.selectionEnd.row),
                    endRow: Math.max(state.selectionStart.row, state.selectionEnd.row),
                    startCol: Math.min(state.selectionStart.col, state.selectionEnd.col),
                    endCol: Math.max(state.selectionStart.col, state.selectionEnd.col),
                };
            }

            function refreshGridDisplay() {
                const sheet = getCurrentSheet();
                // 更新所有单元格的显示值和样式
                const allCells = gridTbody.querySelectorAll('td[data-key]');
                allCells.forEach(td => {
                    const row = parseInt(td.dataset.row);
                    const col = parseInt(td.dataset.col);
                    const displayVal = getCellDisplayValue(row, col, sheet);
                    const cellData = getCellData(row, col, sheet);
                    td.textContent = displayVal;
                    // 更新样式
                    if (cellData && cellData.style) {
                        const s = cellData.style;
                        td.style.fontWeight = s.bold ? 'bold' : 'normal';
                        td.style.fontStyle = s.italic ? 'italic' : 'normal';
                        td.style.textDecoration = s.underline ? 'underline' : 'none';
                        td.style.color = s.textColor || '#000';
                        td.style.backgroundColor = s.bgColor || '#fff';
                        td.style.fontSize = (s.fontSize || 13) + 'px';
                        td.style.textAlign = s.align || 'left';
                    } else {
                        td.style.fontWeight = 'normal';
                        td.style.fontStyle = 'normal';
                        td.style.textDecoration = 'none';
                        td.style.color = '#000';
                        td.style.backgroundColor = '#fff';
                        td.style.fontSize = '13px';
                        td.style.textAlign = 'left';
                    }
                    // 更新选中状态
                    td.classList.remove('selected', 'active-cell');
                    if (isCellInSelection(row, col)) td.classList.add('selected');
                    if (state.activeCell && state.activeCell.row === row && state.activeCell.col === col) {
                        td.classList.add('active-cell');
                    }
                });
                // 更新列宽
                const colHeaders = gridThead.querySelectorAll('th[data-col]');
                colHeaders.forEach(th => {
                    const c = parseInt(th.dataset.col);
                    const width = sheet.colWidths[c] || DEFAULT_COL_WIDTH;
                    th.style.width = width + 'px';
                    th.style.minWidth = width + 'px';
                });
                const colCells = gridTbody.querySelectorAll('td[data-col]');
                colCells.forEach(td => {
                    const c = parseInt(td.dataset.col);
                    const width = sheet.colWidths[c] || DEFAULT_COL_WIDTH;
                    td.style.width = width + 'px';
                    td.style.minWidth = width + 'px';
                });
                // 更新行高
                const rowHeaders = gridTbody.querySelectorAll('th[data-row]');
                rowHeaders.forEach(th => {
                    const r = parseInt(th.dataset.row);
                    const height = sheet.rowHeights[r] || DEFAULT_ROW_HEIGHT;
                    th.style.height = height + 'px';
                });
                const rows = gridTbody.querySelectorAll('tr[data-row]');
                rows.forEach(tr => {
                    const r = parseInt(tr.dataset.row);
                    const height = sheet.rowHeights[r] || DEFAULT_ROW_HEIGHT;
                    tr.style.height = height + 'px';
                });
            }

            function refreshFormulaBar() {
                if (state.activeCell) {
                    cellRef.textContent = rowColToCellKey(state.activeCell.row, state.activeCell.col);
                    const raw = getCellRawValue(state.activeCell.row, state.activeCell.col);
                    formulaInput.value = raw;
                }
            }

            function refreshSheetTabs() {
                let html = '';
                state.sheets.forEach((sheet, idx) => {
                    html +=
                        `<div class="sheet-tab${idx===state.activeSheetIndex?' active':''}" data-index="${idx}" title="${sheet.name}">${escapeHtml(sheet.name)}</div>`;
                });
                sheetTabsDiv.innerHTML = html;
            }

            function refreshStatusBar() {
                if (state.activeCell) {
                    statusCell.textContent = '单元格: ' + rowColToCellKey(state.activeCell.row, state.activeCell.col);
                }
                const range = getSelectionRange();
                if (range && (range.endRow > range.startRow || range.endCol > range.startCol)) {
                    const cells = [];
                    for (let r = range.startRow; r <= range.endRow; r++) {
                        for (let c = range.startCol; c <= range.endCol; c++) {
                            const val = parseFloat(getCellDisplayValue(r, c));
                            if (!isNaN(val)) cells.push(val);
                        }
                    }
                    if (cells.length > 1) {
                        const sum = cells.reduce((a, b) => a + b, 0);
                        const avg = sum / cells.length;
                        statusSum.textContent = `求和: ${sum} | 平均值: ${avg.toFixed(2)} | 计数: ${cells.length}`;
                    } else {
                        statusSum.textContent = '';
                    }
                } else {
                    statusSum.textContent = '';
                }
            }

            function refreshAll() {
                buildGrid();
                refreshFormulaBar();
                refreshSheetTabs();
                refreshStatusBar();
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ==================== 单元格编辑 ====================
            function startEditing(initialValue) {
                if (!state.activeCell) return;
                state.isEditing = true;
                state.editValue = initialValue !== undefined ? initialValue : getCellRawValue(state.activeCell.row,
                    state.activeCell.col);
                formulaInput.value = state.editValue;
                showCellEditor();
            }

            function showCellEditor() {
                if (!state.activeCell || !state.isEditing) {
                    cellEditor.style.display = 'none';
                    return;
                }
                const td = getActiveCellTd();
                if (!td) {
                    cellEditor.style.display = 'none';
                    return;
                }
                const rect = td.getBoundingClientRect();
                const containerRect = gridContainer.getBoundingClientRect();
                cellEditor.style.display = 'block';
                cellEditor.style.left = (rect.left - containerRect.left + gridContainer.scrollLeft) + 'px';
                cellEditor.style.top = (rect.top - containerRect.top + gridContainer.scrollTop) + 'px';
                cellEditor.style.width = Math.max(rect.width, 80) + 'px';
                cellEditor.style.height = Math.max(rect.height, 24) + 'px';
                cellEditor.value = state.editValue;
                cellEditor.focus();
                cellEditor.select();
            }

            function getActiveCellTd() {
                if (!state.activeCell) return null;
                return gridTbody.querySelector(
                    `td[data-row="${state.activeCell.row}"][data-col="${state.activeCell.col}"]`);
            }

            function commitEdit() {
                if (!state.isEditing || !state.activeCell) return;
                state.isEditing = false;
                cellEditor.style.display = 'none';
                const newValue = state.editValue;
                const row = state.activeCell.row;
                const col = state.activeCell.col;
                const sheet = getCurrentSheet();
                const oldAction = saveCellState(row, col);
                updateCellAndRecalculate(row, col, newValue, sheet);
                const newAction = saveCellState(row, col);
                newAction.oldData = oldAction.oldData;
                pushUndo({
                    sheetIndex: state.activeSheetIndex,
                    oldData: oldAction.oldData,
                    newData: newAction.oldData ? (function() {
                        const d = {};
                        const key = rowColToCellKey(row, col);
                        if (sheet.cells[key]) d[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                        else d[key] = null;
                        return d;
                    })() : newAction.oldData,
                });
                // 修正undo数据
                const lastUndo = state.undoStack[state.undoStack.length - 1];
                if (lastUndo) {
                    const key = rowColToCellKey(row, col);
                    lastUndo.newData = {};
                    if (sheet.cells[key]) lastUndo.newData[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                    else lastUndo.newData[key] = null;
                }
                refreshAll();
            }

            function cancelEdit() {
                if (!state.isEditing) return;
                state.isEditing = false;
                cellEditor.style.display = 'none';
                state.editValue = '';
                refreshFormulaBar();
            }

            // ==================== 事件处理 ====================
            function handleCellMouseDown(e, row, col) {
                if (e.button === 2) return; // 右键
                if (state.isEditing) {
                    commitEdit();
                }
                if (e.shiftKey && state.activeCell) {
                    // 扩展选择范围
                    state.selectionStart = { row: state.activeCell.row, col: state.activeCell.col };
                    state.selectionEnd = { row, col };
                    state.activeCell = { row, col };
                } else {
                    state.activeCell = { row, col };
                    state.selectionStart = { row, col };
                    state.selectionEnd = { row, col };
                }
                state.isDragging = true;
                state.dragStartCell = { row, col };
                refreshAll();
                cellEditor.style.display = 'none';
                state.isEditing = false;
            }

            function handleCellMouseMove(e, row, col) {
                if (state.isDragging && state.dragStartCell) {
                    state.selectionStart = { row: state.dragStartCell.row, col: state.dragStartCell.col };
                    state.selectionEnd = { row, col };
                    state.activeCell = { row, col };
                    refreshGridDisplay();
                    refreshFormulaBar();
                    refreshStatusBar();
                }
            }

            function handleCellMouseUp(e) {
                state.isDragging = false;
                state.dragStartCell = null;
                refreshStatusBar();
            }

            function handleCellDblClick(row, col) {
                state.activeCell = { row, col };
                state.selectionStart = { row, col };
                state.selectionEnd = { row, col };
                refreshAll();
                startEditing(getCellRawValue(row, col));
            }

            function handleGridClick(e) {
                // 点击到空白区域
                if (e.target === gridTbody || e.target === gridContainer) {
                    state.selectionStart = null;
                    state.selectionEnd = null;
                    refreshAll();
                }
            }

            function handleKeyDown(e) {
                if (state.isEditing) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        commitEdit();
                        moveActiveCell(1, 0);
                    } else if (e.key === 'Escape') {
                        e.preventDefault();
                        cancelEdit();
                        refreshAll();
                    } else if (e.key === 'Tab') {
                        e.preventDefault();
                        commitEdit();
                        moveActiveCell(0, 1);
                    }
                    return;
                }

                if (!state.activeCell) return;

                const ctrl = e.ctrlKey || e.metaKey;
                const shift = e.shiftKey;

                switch (e.key) {
                    case 'ArrowUp':
                        e.preventDefault();
                        moveActiveCell(-1, 0, shift);
                        break;
                    case 'ArrowDown':
                        e.preventDefault();
                        moveActiveCell(1, 0, shift);
                        break;
                    case 'ArrowLeft':
                        e.preventDefault();
                        moveActiveCell(0, -1, shift);
                        break;
                    case 'ArrowRight':
                        e.preventDefault();
                        moveActiveCell(0, 1, shift);
                        break;
                    case 'Tab':
                        e.preventDefault();
                        moveActiveCell(0, 1);
                        break;
                    case 'Enter':
                        e.preventDefault();
                        startEditing();
                        break;
                    case 'F2':
                        e.preventDefault();
                        startEditing();
                        break;
                    case 'Delete':
                    case 'Backspace':
                        e.preventDefault();
                        clearActiveCells();
                        break;
                    case 'c':
                        if (ctrl) {
                            e.preventDefault();
                            copySelection();
                        }
                        break;
                    case 'v':
                        if (ctrl) {
                            e.preventDefault();
                            pasteToCell();
                        }
                        break;
                    case 'x':
                        if (ctrl) {
                            e.preventDefault();
                            cutSelection();
                        }
                        break;
                    case 'z':
                        if (ctrl && !shift) {
                            e.preventDefault();
                            undo();
                        }
                        break;
                    case 'y':
                        if (ctrl) {
                            e.preventDefault();
                            redo();
                        }
                        break;
                    case 'b':
                        if (ctrl) {
                            e.preventDefault();
                            toggleBold();
                        }
                        break;
                    case 'i':
                        if (ctrl) {
                            e.preventDefault();
                            toggleItalic();
                        }
                        break;
                    case 'u':
                        if (ctrl) {
                            e.preventDefault();
                            toggleUnderline();
                        }
                        break;
                    default:
                        // 如果按下可打印字符，开始编辑
                        if (e.key.length === 1 && !ctrl && !e.altKey) {
                            e.preventDefault();
                            state.activeCell = {
                                row: state.activeCell.row,
                                col: state.activeCell.col
                            };
                            state.selectionStart = { ...state.activeCell };
                            state.selectionEnd = { ...state.activeCell };
                            refreshAll();
                            startEditing(e.key);
                        }
                        break;
                }
            }

            function moveActiveCell(dRow, dCol, extendSelection = false) {
                if (!state.activeCell) return;
                const newRow = Math.max(1, Math.min(TOTAL_ROWS, state.activeCell.row + dRow));
                const newCol = Math.max(0, Math.min(TOTAL_COLS - 1, state.activeCell.col + dCol));
                if (extendSelection) {
                    state.selectionEnd = { row: newRow, col: newCol };
                } else {
                    state.selectionStart = { row: newRow, col: newCol };
                    state.selectionEnd = { row: newRow, col: newCol };
                }
                state.activeCell = { row: newRow, col: newCol };
                refreshAll();
                scrollToCell(newRow, newCol);
            }

            function scrollToCell(row, col) {
                const td = gridTbody.querySelector(`td[data-row="${row}"][data-col="${col}"]`);
                if (td) {
                    td.scrollIntoView({ block: 'nearest', inline: 'nearest' });
                }
            }

            function clearActiveCells() {
                const range = getSelectionRange();
                if (!range) return;
                const sheet = getCurrentSheet();
                const oldDataAll = {};
                const newDataAll = {};
                for (let r = range.startRow; r <= range.endRow; r++) {
                    for (let c = range.startCol; c <= range.endCol; c++) {
                        const key = rowColToCellKey(r, c);
                        if (sheet.cells[key]) {
                            oldDataAll[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                        } else {
                            oldDataAll[key] = null;
                        }
                        delete sheet.cells[key];
                        newDataAll[key] = null;
                    }
                }
                pushUndo({
                    sheetIndex: state.activeSheetIndex,
                    oldData: oldDataAll,
                    newData: newDataAll,
                });
                recalculateSheet(sheet);
                refreshAll();
            }

            function copySelection() {
                const range = getSelectionRange();
                if (!range) return;
                const sheet = getCurrentSheet();
                state.clipboard = {
                    cells: {},
                    startRow: range.startRow,
                    startCol: range.startCol,
                    numRows: range.endRow - range.startRow + 1,
                    numCols: range.endCol - range.startCol + 1,
                };
                for (let r = range.startRow; r <= range.endRow; r++) {
                    for (let c = range.startCol; c <= range.endCol; c++) {
                        const key = rowColToCellKey(r, c);
                        const offsetKey = rowColToCellKey(r - range.startRow, c - range.startCol);
                        if (sheet.cells[key]) {
                            state.clipboard.cells[offsetKey] = JSON.parse(JSON.stringify(sheet.cells[key]));
                        } else {
                            state.clipboard.cells[offsetKey] = null;
                        }
                    }
                }
                state.clipboardMode = 'copy';
                statusCell.textContent = '已复制选区';
            }

            function cutSelection() {
                copySelection();
                state.clipboardMode = 'cut';
                const range = getSelectionRange();
                if (!range) return;
                const sheet = getCurrentSheet();
                const oldDataAll = {};
                const newDataAll = {};
                for (let r = range.startRow; r <= range.endRow; r++) {
                    for (let c = range.startCol; c <= range.endCol; c++) {
                        const key = rowColToCellKey(r, c);
                        if (sheet.cells[key]) {
                            oldDataAll[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                        } else {
                            oldDataAll[key] = null;
                        }
                        delete sheet.cells[key];
                        newDataAll[key] = null;
                    }
                }
                pushUndo({
                    sheetIndex: state.activeSheetIndex,
                    oldData: oldDataAll,
                    newData: newDataAll,
                });
                recalculateSheet(sheet);
                refreshAll();
                statusCell.textContent = '已剪切选区';
            }

            function pasteToCell() {
                if (!state.clipboard || !state.activeCell) return;
                const sheet = getCurrentSheet();
                const startRow = state.activeCell.row;
                const startCol = state.activeCell.col;
                const oldDataAll = {};
                const newDataAll = {};
                for (const offsetKey in state.clipboard.cells) {
                    const rc = cellKeyToRowCol(offsetKey);
                    if (!rc) continue;
                    const targetRow = startRow + rc.row;
                    const targetCol = startCol + rc.col;
                    if (targetRow < 1 || targetRow > TOTAL_ROWS || targetCol < 0 || targetCol >= TOTAL_COLS) continue;
                    const targetKey = rowColToCellKey(targetRow, targetCol);
                    if (sheet.cells[targetKey]) {
                        oldDataAll[targetKey] = JSON.parse(JSON.stringify(sheet.cells[targetKey]));
                    } else {
                        oldDataAll[targetKey] = null;
                    }
                    if (state.clipboard.cells[offsetKey]) {
                        sheet.cells[targetKey] = JSON.parse(JSON.stringify(state.clipboard.cells[offsetKey]));
                    } else {
                        delete sheet.cells[targetKey];
                    }
                    if (sheet.cells[targetKey]) {
                        newDataAll[targetKey] = JSON.parse(JSON.stringify(sheet.cells[targetKey]));
                    } else {
                        newDataAll[targetKey] = null;
                    }
                }
                pushUndo({
                    sheetIndex: state.activeSheetIndex,
                    oldData: oldDataAll,
                    newData: newDataAll,
                });
                if (state.clipboardMode === 'cut') {
                    state.clipboard = null;
                    state.clipboardMode = null;
                }
                recalculateSheet(sheet);
                // 更新选择范围
                state.selectionStart = { row: startRow, col: startCol };
                state.selectionEnd = {
                    row: startRow + (state.clipboard ? state.clipboard.numRows - 1 : 0),
                    col: startCol + (state.clipboard ? state.clipboard.numCols - 1 : 0),
                };
                refreshAll();
                statusCell.textContent = '已粘贴';
            }

            function toggleBold() {
                applyStyleToSelection('bold', 'toggle');
            }

            function toggleItalic() {
                applyStyleToSelection('italic', 'toggle');
            }

            function toggleUnderline() {
                applyStyleToSelection('underline', 'toggle');
            }

            function applyStyleToSelection(property, value) {
                const range = getSelectionRange();
                if (!range) return;
                const sheet = getCurrentSheet();
                const oldDataAll = {};
                const newDataAll = {};
                for (let r = range.startRow; r <= range.endRow; r++) {
                    for (let c = range.startCol; c <= range.endCol; c++) {
                        const key = rowColToCellKey(r, c);
                        if (sheet.cells[key]) {
                            oldDataAll[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                        } else {
                            oldDataAll[key] = null;
                        }
                        const cellData = getOrCreateCellData(r, c, sheet);
                        if (value === 'toggle') {
                            cellData.style[property] = !cellData.style[property];
                        } else {
                            cellData.style[property] = value;
                        }
                        if (sheet.cells[key]) {
                            newDataAll[key] = JSON.parse(JSON.stringify(sheet.cells[key]));
                        } else {
                            newDataAll[key] = null;
                        }
                    }
                }
                pushUndo({
                    sheetIndex: state.activeSheetIndex,
                    oldData: oldDataAll,
                    newData: newDataAll,
                });
                refreshGridDisplay();
                updateToolbarButtons();
            }

            function updateToolbarButtons() {
                const btnBold = document.getElementById('btn-bold');
                const btnItalic = document.getElementById('btn-italic');
                const btnUnderline = document.getElementById('btn-underline');
                if (state.activeCell) {
                    const cellData = getCellData(state.activeCell.row, state.activeCell.col);
                    if (cellData && cellData.style) {
                        btnBold.classList.toggle('active', cellData.style.bold);
                        btnItalic.classList.toggle('active', cellData.style.italic);
                        btnUnderline.classList.toggle('active', cellData.style.underline);
                        document.getElementById('text-color').value = cellData.style.textColor || '#000000';
                        document.getElementById('bg-color').value = cellData.style.bgColor || '#ffffff';
                        document.getElementById('font-size').value = cellData.style.fontSize || 13;
                    } else {
                        btnBold.classList.remove('active');
                        btnItalic.classList.remove('active');
                        btnUnderline.classList.remove('active');
                    }
                }
            }

            // ==================== 列宽/行高调整 ====================
            function handleColResizeStart(e, colIndex) {
                e.preventDefault();
                e.stopPropagation();
                state.colResizing = {
                    colIndex: colIndex,
                    startX: e.clientX,
                    startWidth: getCurrentSheet().colWidths[colIndex] || DEFAULT_COL_WIDTH,
                };
                document.addEventListener('mousemove', handleColResizeMove);
                document.addEventListener('mouseup', handleColResizeEnd);
                document.body.style.cursor = 'col-resize';
            }

            function handleColResizeMove(e) {
                if (!state.colResizing) return;
                const diff = e.clientX - state.colResizing.startX;
                const newWidth = Math.max(40, state.colResizing.startWidth + diff);
                getCurrentSheet().colWidths[state.colResizing.colIndex] = newWidth;
                refreshGridDisplay();
                // 更新列头宽度
                const th = gridThead.querySelector(`th[data-col="${state.colResizing.colIndex}"]`);
                if (th) {
                    th.style.width = newWidth + 'px';
                    th.style.minWidth = newWidth + 'px';
                }
            }

            function handleColResizeEnd(e) {
                document.removeEventListener('mousemove', handleColResizeMove);
                document.removeEventListener('mouseup', handleColResizeEnd);
                document.body.style.cursor = '';
                state.colResizing = null;
                refreshAll();
            }

            function handleRowResizeStart(e, rowIndex) {
                e.preventDefault();
                e.stopPropagation();
                state.rowResizing = {
                    rowIndex: rowIndex,
                    startY: e.clientY,
                    startHeight: getCurrentSheet().rowHeights[rowIndex] || DEFAULT_ROW_HEIGHT,
                };
                document.addEventListener('mousemove', handleRowResizeMove);
                document.addEventListener('mouseup', handleRowResizeEnd);
                document.body.style.cursor = 'row-resize';
            }

            function handleRowResizeMove(e) {
                if (!state.rowResizing) return;
                const diff = e.clientY - state.rowResizing.startY;
                const newHeight = Math.max(18, state.rowResizing.startHeight + diff);
                getCurrentSheet().rowHeights[state.rowResizing.rowIndex] = newHeight;
                const tr = gridTbody.querySelector(`tr[data-row="${state.rowResizing.rowIndex}"]`);
                if (tr) tr.style.height = newHeight + 'px';
                const th = gridTbody.querySelector(`th[data-row="${state.rowResizing.rowIndex}"]`);
                if (th) th.style.height = newHeight + 'px';
            }

            function handleRowResizeEnd(e) {
                document.removeEventListener('mousemove', handleRowResizeMove);
                document.removeEventListener('mouseup', handleRowResizeEnd);
                document.body.style.cursor = '';
                state.rowResizing = null;
                refreshAll();
            }

            // ==================== 右键菜单 ====================
            function showContextMenu(e) {
                e.preventDefault();
                const menu = contextMenu;
                menu.style.display = 'block';
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
                // 确保菜单不超出屏幕
                const rect = menu.getBoundingClientRect();
                if (rect.right > window.innerWidth) menu.style.left = (e.clientX - rect.width) + 'px';
                if (rect.bottom > window.innerHeight) menu.style.top = (e.clientY - rect.height) + 'px';
            }

            function hideContextMenu() {
                contextMenu.style.display = 'none';
            }

            function handleContextMenuAction(action) {
                hideContextMenu();
                switch (action) {
                    case 'copy':
                        copySelection();
                        break;
                    case 'cut':
                        cutSelection();
                        break;
                    case 'paste':
                        pasteToCell();
                        break;
                    case 'clear':
                        clearActiveCells();
                        break;
                    case 'insert-row':
                        insertRow();
                        break;
                    case 'delete-row':
                        deleteRow();
                        break;
                }
            }

            function insertRow() {
                if (!state.activeCell) return;
                const targetRow = state.activeCell.row;
                const sheet = getCurrentSheet();
                const oldDataAll = {};
                const newDataAll = {};
                // 移动所有行
                const newCells = {};
                for (const key in sheet.cells) {
                    const rc = cellKeyToRowCol(key);
                    if (!rc) { newCells[key] = sheet.cells[key]; continue; }
                    if (rc.row >= targetRow) {
                        const newKey = rowColToCellKey(rc.row + 1, rc.col);
                        oldDataAll[key] = sheet.cells[key] ? JSON.parse(JSON.stringify(sheet.cells[key])) : null;
                        newCells[newKey] = sheet.cells[key];
                        newDataAll[newKey] = sheet.cells[key] ? JSON.parse(JSON.stringify(sheet.cells[key])) :
                        null;
                    } else {
                        newCells[key] = sheet.cells[key];
                    }
                }
                // 清空目标行
                for (let c = 0; c < TOTAL_COLS; c++) {
                    const clearKey = rowColToCellKey(targetRow, c);
                    if (sheet.cells[clearKey]) oldDataAll[clearKey] = JSON.parse(JSON.stringify(sheet.cells[clearKey]));
                    else oldDataAll[clearKey] = null;
                    delete newCells[clearKey];
                    newDataAll[clearKey] = null;
                }
                sheet.cells = newCells;
                pushUndo({ sheetIndex: state.activeSheetIndex, oldData: oldDataAll, newData: newDataAll });
                recalculateSheet(sheet);
                refreshAll();
            }

            function deleteRow() {
                if (!state.activeCell) return;
                const targetRow = state.activeCell.row;
                const sheet = getCurrentSheet();
                const oldDataAll = {};
                const newDataAll = {};
                const newCells = {};
                for (const key in sheet.cells) {
                    const rc = cellKeyToRowCol(key);
                    if (!rc) { newCells[key] = sheet.cells[key]; continue; }
                    oldDataAll[key] = sheet.cells[key] ? JSON.parse(JSON.stringify(sheet.cells[key])) : null;
                    if (rc.row < targetRow) {
                        newCells[key] = sheet.cells[key];
                    } else if (rc.row > targetRow) {
                        const newKey = rowColToCellKey(rc.row - 1, rc.col);
                        newCells[newKey] = sheet.cells[key];
                        newDataAll[newKey] = sheet.cells[key] ? JSON.parse(JSON.stringify(sheet.cells[key])) : null;
                    }
                    // rc.row === targetRow 的行被删除
                }
                sheet.cells = newCells;
                pushUndo({ sheetIndex: state.activeSheetIndex, oldData: oldDataAll, newData: newDataAll });
                recalculateSheet(sheet);
                if (state.activeCell.row > TOTAL_ROWS) state.activeCell.row = TOTAL_ROWS;
                refreshAll();
            }

            // ==================== 工作表管理 ====================
            function switchSheet(index) {
                if (state.isEditing) commitEdit();
                state.activeSheetIndex = index;
                state.activeCell = { row: 1, col: 0 };
                state.selectionStart = { row: 1, col: 0 };
                state.selectionEnd = { row: 1, col: 0 };
                refreshAll();
            }

            function addSheet() {
                if (state.isEditing) commitEdit();
                const newIndex = state.sheets.length;
                state.sheets.push(createEmptySheet('Sheet' + (newIndex + 1)));
                state.activeSheetIndex = newIndex;
                state.activeCell = { row: 1, col: 0 };
                state.selectionStart = { row: 1, col: 0 };
                state.selectionEnd = { row: 1, col: 0 };
                refreshAll();
            }

            // ==================== 初始化 ====================
            function init() {
                // 创建默认工作表
                state.sheets = [createEmptySheet('Sheet1')];
                state.activeSheetIndex = 0;
                state.activeCell = { row: 1, col: 0 };
                state.selectionStart = { row: 1, col: 0 };
                state.selectionEnd = { row: 1, col: 0 };

                // 添加一些示例数据
                const sheet = state.sheets[0];
                updateCellAndRecalculate(1, 0, '项目', sheet);
                updateCellAndRecalculate(1, 1, '数量', sheet);
                updateCellAndRecalculate(1, 2, '单价', sheet);
                updateCellAndRecalculate(1, 3, '金额', sheet);
                updateCellAndRecalculate(2, 0, '苹果', sheet);
                updateCellAndRecalculate(2, 1, '10', sheet);
                updateCellAndRecalculate(2, 2, '5.5', sheet);
                updateCellAndRecalculate(2, 3, '=B2*C2', sheet);
                updateCellAndRecalculate(3, 0, '香蕉', sheet);
                updateCellAndRecalculate(3, 1, '8', sheet);
                updateCellAndRecalculate(3, 2, '3.2', sheet);
                updateCellAndRecalculate(3, 3, '=B3*C3', sheet);
                updateCellAndRecalculate(4, 0, '橙子', sheet);
                updateCellAndRecalculate(4, 1, '15', sheet);
                updateCellAndRecalculate(4, 2, '4.0', sheet);
                updateCellAndRecalculate(4, 3, '=B4*C4', sheet);
                updateCellAndRecalculate(6, 0, '合计', sheet);
                updateCellAndRecalculate(6, 3, '=SUM(D2:D4)', sheet);
                updateCellAndRecalculate(7, 0, '平均', sheet);
                updateCellAndRecalculate(7, 3, '=AVERAGE(D2:D4)', sheet);
                // 样式
                getOrCreateCellData(1, 0, sheet).style.bold = true;
                getOrCreateCellData(1, 1, sheet).style.bold = true;
                getOrCreateCellData(1, 2, sheet).style.bold = true;
                getOrCreateCellData(1, 3, sheet).style.bold = true;
                getOrCreateCellData(6, 0, sheet).style.bold = true;
                getOrCreateCellData(6, 3, sheet).style.bold = true;
                getOrCreateCellData(1, 0, sheet).style.bgColor = '#e8f0fe';
                getOrCreateCellData(1, 1, sheet).style.bgColor = '#e8f0fe';
                getOrCreateCellData(1, 2, sheet).style.bgColor = '#e8f0fe';
                getOrCreateCellData(1, 3, sheet).style.bgColor = '#e8f0fe';

                recalculateSheet(sheet);
                buildGrid();
                refreshFormulaBar();
                refreshSheetTabs();
                refreshStatusBar();

                // 绑定事件
                bindEvents();
            }

            function bindEvents() {
                // 表格容器事件委托
                gridTbody.addEventListener('mousedown', function(e) {
                    const td = e.target.closest('td[data-row][data-col]');
                    if (td) {
                        const row = parseInt(td.dataset.row);
                        const col = parseInt(td.dataset.col);
                        handleCellMouseDown(e, row, col);
                    }
                    // 行高调整手柄
                    const rowHandle = e.target.closest('.row-resize-handle');
                    if (rowHandle) {
                        const row = parseInt(rowHandle.dataset.row);
                        handleRowResizeStart(e, row);
                    }
                });

                gridTbody.addEventListener('mousemove', function(e) {
                    if (state.isDragging) {
                        const td = e.target.closest('td[data-row][data-col]');
                        if (td) {
                            const row = parseInt(td.dataset.row);
                            const col = parseInt(td.dataset.col);
                            handleCellMouseMove(e, row, col);
                        }
                    }
                });

                document.addEventListener('mouseup', function(e) {
                    if (state.isDragging) {
                        handleCellMouseUp(e);
                    }
                });

                gridTbody.addEventListener('dblclick', function(e) {
                    const td = e.target.closest('td[data-row][data-col]');
                    if (td) {
                        const row = parseInt(td.dataset.row);
                        const col = parseInt(td.dataset.col);
                        handleCellDblClick(row, col);
                    }
                });

                gridTbody.addEventListener('contextmenu', function(e) {
                    const td = e.target.closest('td[data-row][data-col]');
                    if (td) {
                        const row = parseInt(td.dataset.row);
                        const col = parseInt(td.dataset.col);
                        state.activeCell = { row, col };
                        state.selectionStart = { row, col };
                        state.selectionEnd = { row, col };
                        refreshAll();
                    }
                    showContextMenu(e);
                });

                // 列头事件
                gridThead.addEventListener('mousedown', function(e) {
                    const handle = e.target.closest('.col-resize-handle');
                    if (handle) {
                        const col = parseInt(handle.dataset.col);
                        handleColResizeStart(e, col);
                    }
                    const th = e.target.closest('th[data-col]');
                    if (th && !e.target.closest('.col-resize-handle')) {
                        const col = parseInt(th.dataset.col);
                        // 选择整列
                        state.selectionStart = { row: 1, col: col };
                        state.selectionEnd = { row: TOTAL_ROWS, col: col };
                        state.activeCell = { row: 1, col: col };
                        refreshAll();
                    }
                });

                // 行头点击选择整行
                gridTbody.addEventListener('mousedown', function(e) {
                    const th = e.target.closest('th[data-row]');
                    if (th && !e.target.closest('.row-resize-handle') && !e.target.closest('td')) {
                        const row = parseInt(th.dataset.row);
                        state.selectionStart = { row: row, col: 0 };
                        state.selectionEnd = { row: row, col: TOTAL_COLS - 1 };
                        state.activeCell = { row: row, col: 0 };
