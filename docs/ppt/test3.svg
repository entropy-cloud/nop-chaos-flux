<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <!-- 发光与阴影滤镜 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur" />
      <feMerge>
        <feMergeNode in="coloredBlur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glow-mild" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    
    <!-- 渐变 -->
    <radialGradient id="coreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="30%" stop-color="#00FFFF" />
      <stop offset="70%" stop-color="#0088FF" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="beamGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF00FF" />
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="beamGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7000FF" />
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0" />
    </radialGradient>
    
    <linearGradient id="forceFieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#FF00FF" stop-opacity="0.1" />
    </linearGradient>

    <!-- 力场网格图案 -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(0, 255, 255, 0.25)" stroke-width="0.5" />
      <circle cx="0" cy="0" r="1.5" fill="#00FFFF" fill-opacity="0.5" />
    </pattern>

    <!-- 包含光束的裁切路径 -->
    <clipPath id="forceFieldClip">
      <circle cx="400" cy="250" r="180" />
    </clipPath>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="500" fill="#0A0F18" />

  <!-- 背景粒子 -->
  <circle cx="200" cy="100" r="1" fill="#FFFFFF" opacity="0.3" />
  <circle cx="600" cy="120" r="1.5" fill="#00FFFF" opacity="0.4" />
  <circle cx="150" cy="400" r="1" fill="#FF00FF" opacity="0.3" />
  <circle cx="700" cy="350" r="2" fill="#FFFFFF" opacity="0.2" />
  <circle cx="350" cy="450" r="1.5" fill="#00FFFF" opacity="0.3" />

  <!-- 发散光束（在裁切路径内） -->
  <g clip-path="url(#forceFieldClip)">
    <!-- 光束 1 -->
    <path d="M 400 250 L 100 -50" stroke="url(#beamGrad1)" stroke-width="12" fill="none" stroke-linecap="round" filter="url(#glow-mild)"/>
    <path d="M 400 250 Q 250 100, 100 -50" stroke="url(#beamGrad2)" stroke-width="4" fill="none" stroke-linecap="round" />
    
    <!-- 光束 2 -->
    <path d="M 400 250 L 700 -50" stroke="url(#beamGrad2)" stroke-width="10" fill="none" stroke-linecap="round" filter="url(#glow-mild)"/>
    <path d="M 400 250 Q 550 100, 700 -50" stroke="url(#beamGrad1)" stroke-width="5" fill="none" stroke-linecap="round" />
    
    <!-- 光束 3 -->
    <path d="M 400 250 L 850 250" stroke="url(#beamGrad1)" stroke-width="14" fill="none" stroke-linecap="round" filter="url(#glow-mild)"/>
    <path d="M 400 250 Q 600 250, 850 250" stroke="url(#beamGrad2)" stroke-width="6" fill="none" stroke-linecap="round" />
    
    <!-- 光束 4 -->
    <path d="M 400 250 L 750 600" stroke="url(#beamGrad2)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#glow-mild)"/>
    <path d="M 400 250 Q 600 400, 750 600" stroke="url(#beamGrad1)" stroke-width="3" fill="none" stroke-linecap="round" />
    
    <!-- 光束 5 -->
    <path d="M 400 250 L 400 600" stroke="url(#beamGrad1)" stroke-width="11" fill="none" stroke-linecap="round" filter="url(#glow-mild)"/>
    <path d="M 400 250 Q 400 400, 400 600" stroke="url(#beamGrad2)" stroke-width="5" fill="none" stroke-linecap="round" />
    
    <!-- 光束 6 -->
    <path d="M 400 250 L -50 400" stroke="url(#beamGrad2)" stroke-width="9" fill="none" stroke-linecap="round" filter="url(#glow-mild)"/>
    <path d="M 400 250 Q 150 350, -50 400" stroke="url(#beamGrad1)" stroke-width="4" fill="none" stroke-linecap="round" />
  </g>

  <!-- 力场穹顶（网格球体） -->
  <circle cx="400" cy="250" r="180" fill="url(#grid)" stroke="url(#forceFieldGrad)" stroke-width="2" />
  <circle cx="400" cy="250" r="180" fill="none" stroke="#00FFFF" stroke-width="1.5" stroke-dasharray="10, 15" opacity="0.4" filter="url(#glow-mild)"/>
  <circle cx="400" cy="250" r="170" fill="none" stroke="#FF00FF" stroke-width="0.5" stroke-dasharray="5, 10" opacity="0.2" />
  <circle cx="400" cy="250" r="190" fill="none" stroke="#00FFFF" stroke-width="0.5" stroke-dasharray="2, 8" opacity="0.2" />

  <!-- 核心吸引子 -->
  <circle cx="400" cy="250" r="50" fill="url(#coreGrad)" filter="url(#glow)" />
  <circle cx="400" cy="250" r="15" fill="#FFFFFF" filter="url(#glow-mild)" />

  <!-- 标题 -->
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">核心模型：受控收敛的动力系统</text>
  <text x="40" y="65" font-family="Arial, sans-serif" font-size="14" fill="#888888">吸引子 / 扩张力 / 收敛力</text>

  <!-- 图例 -->
  <rect x="550" y="400" width="10" height="10" fill="#00FFFF" />
  <text x="570" y="410" font-family="Arial, sans-serif" font-size="12" fill="#CCCCCC">扩张力（发散）</text>
  
  <rect x="550" y="420" width="10" height="10" fill="#FF00FF" />
  <text x="570" y="430" font-family="Arial, sans-serif" font-size="12" fill="#CCCCCC">收敛力场（约束）</text>

  <circle cx="555" cy="445" r="5" fill="#FFFFFF" filter="url(#glow-mild)"/>
  <text x="570" y="450" font-family="Arial, sans-serif" font-size="12" fill="#CCCCCC">吸引子核心（目标）</text>
</svg>